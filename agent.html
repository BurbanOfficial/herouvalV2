<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent - Enregistrement Bus</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Retour</a>
            <h1>🚌 Enregistrement d'un Bus</h1>
            <div></div>
        </header>

        <!-- Étape 1: Scan Plaque -->
        <section id="step1" class="form-container">
            <h2 class="mb-2">Étape 1 : Plaque d'immatriculation</h2>
            
            <div class="scanner-container" id="scannerContainer">
                <div class="camera-preview" id="cameraPreview">
                    <p>Cliquez sur "Démarrer la caméra" pour scanner</p>
                </div>
                <div class="scanner-overlay hidden" id="scannerOverlay">
                    <div class="scanner-line"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="startCameraBtn">
                    📷 Démarrer la caméra
                </button>
                <button class="btn btn-secondary hidden" id="captureBtn">
                    📸 Capturer
                </button>
                <button class="btn btn-outline" id="manualBtn">
                    ⌨️ Saisir manuellement
                </button>
            </div>

            <div class="scanner-result hidden" id="plateResult"></div>

            <div class="form-group hidden" id="manualInputGroup">
                <label for="manualPlate">Plaque d'immatriculation</label>
                <input type="text" id="manualPlate" placeholder="AB-123-CD">
            </div>

            <button class="btn btn-success btn-block hidden" id="confirmPlateBtn">
                Confirmer et continuer →
            </button>
        </section>

        <!-- Étape 2: Informations Groupe -->
        <section id="step2" class="form-container hidden">
            <h2 class="mb-2">Étape 2 : Informations du groupe</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="schoolName">Nom de l'école/organisation *</label>
                    <input type="text" id="schoolName" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">Ville *</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label for="postalCode">Code postal *</label>
                    <input type="text" id="postalCode" pattern="[0-9]{5}" maxlength="5" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="childrenCount">Nombre d'enfants *</label>
                    <input type="number" id="childrenCount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="adultsCount">Nombre d'accompagnateurs *</label>
                    <input type="number" id="adultsCount" min="1" required>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" id="backToStep1">← Retour</button>
                <button class="btn btn-success" id="confirmStep2">
                    Continuer →
                </button>
            </div>
        </section>

        <!-- Étape 3: Responsable et Signature -->
        <section id="step3" class="form-container hidden">
            <h2 class="mb-2">Étape 3 : Responsable de la sortie</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="leaderLastName">Nom du responsable *</label>
                    <input type="text" id="leaderLastName" required>
                </div>
                <div class="form-group">
                    <label for="leaderFirstName">Prénom du responsable *</label>
                    <input type="text" id="leaderFirstName" required>
                </div>
            </div>

            <div class="form-group">
                <label>Signature du responsable *</label>
                <div class="signature-container">
                    <canvas id="signaturePad"></canvas>
                </div>
                <button class="btn btn-outline btn-sm" id="clearSignature" style="margin-top: 0.5rem;">
                    Effacer la signature
                </button>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" id="backToStep2">← Retour</button>
                <button class="btn btn-success" id="validateGroup">
                    ✓ Valider le groupe
                </button>
            </div>
        </section>

        <!-- Étape 4: QR Code Généré -->
        <section id="step4" class="form-container hidden">
            <h2 class="text-center mb-2">Groupe Enregistré !</h2>
            
            <div class="qr-display">
                <div id="qrcode"></div>
                <div class="group-info">
                    <div class="group-id" id="groupId"></div>
                    <p id="groupSchool"></p>
                    <p id="groupLeader"></p>
                    <p id="groupTime"></p>
                </div>
            </div>

            <p class="text-center" style="color: var(--text-muted); margin-bottom: 1rem;">
                Ce QR code a été envoyé à la caisse. L'impression se fait à l'accueil.
            </p>

            <button class="btn btn-primary btn-block" id="newRegistration">
                + Nouvel enregistrement
            </button>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        // Agent-specific code
        const agent = {
            currentStep: 1,
            plateNumber: '',
            stream: null,
            
            init() {
                this.setupEventListeners();
                this.setupSignaturePad();
            },

            setupEventListeners() {
                document.getElementById('startCameraBtn').addEventListener('click', () => this.startCamera());
                document.getElementById('captureBtn').addEventListener('click', () => this.capturePlate());
                document.getElementById('manualBtn').addEventListener('click', () => this.showManualInput());
                document.getElementById('confirmPlateBtn').addEventListener('click', () => this.goToStep(2));
                document.getElementById('backToStep1').addEventListener('click', () => this.goToStep(1));
                document.getElementById('confirmStep2').addEventListener('click', () => this.confirmStep2());
                document.getElementById('backToStep2').addEventListener('click', () => this.goToStep(2));
                document.getElementById('validateGroup').addEventListener('click', () => this.validateGroup());
                document.getElementById('clearSignature').addEventListener('click', () => this.clearSignature());
                document.getElementById('newRegistration').addEventListener('click', () => this.reset());

                // Manual plate input
                document.getElementById('manualPlate').addEventListener('input', (e) => {
                    this.plateNumber = e.target.value.toUpperCase();
                    document.getElementById('plateResult').textContent = this.plateNumber;
                });
            },

            setupSignaturePad() {
                const canvas = document.getElementById('signaturePad');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                let drawing = false;

                // Set fixed canvas size (CSS width will scale it visually)
                const width = 600;
                const height = 200;
                canvas.width = width;
                canvas.height = height;
                
                // Store actual size for coordinate calculation
                canvas.dataset.width = width;
                canvas.dataset.height = height;

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const getPoint = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    
                    let clientX, clientY;
                    if (e.touches && e.touches.length > 0) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else if (e.changedTouches && e.changedTouches.length > 0) {
                        clientX = e.changedTouches[0].clientX;
                        clientY = e.changedTouches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    
                    return {
                        x: (clientX - rect.left) * scaleX,
                        y: (clientY - rect.top) * scaleY
                    };
                };

                const startDrawing = (e) => {
                    e.preventDefault();
                    drawing = true;
                    const point = getPoint(e);
                    ctx.beginPath();
                    ctx.moveTo(point.x, point.y);
                };

                const draw = (e) => {
                    e.preventDefault();
                    if (!drawing) return;
                    const point = getPoint(e);
                    ctx.lineTo(point.x, point.y);
                    ctx.stroke();
                };

                const stopDrawing = (e) => {
                    if (!drawing) return;
                    drawing = false;
                    ctx.closePath();
                };

                // Mouse events
                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseleave', stopDrawing);

                // Touch events
                canvas.addEventListener('touchstart', startDrawing, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', stopDrawing);
                canvas.addEventListener('touchcancel', stopDrawing);
            },

            getCoordinates(e, canvas) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            },

            clearSignature() {
                const canvas = document.getElementById('signaturePad');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            },

            async startCamera() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    
                    const preview = document.getElementById('cameraPreview');
                    const video = document.createElement('video');
                    video.srcObject = this.stream;
                    video.autoplay = true;
                    video.playsInline = true;
                    
                    preview.innerHTML = '';
                    preview.appendChild(video);
                    
                    document.getElementById('scannerOverlay').classList.remove('hidden');
                    document.getElementById('startCameraBtn').classList.add('hidden');
                    document.getElementById('captureBtn').classList.remove('hidden');
                    document.getElementById('scannerContainer').classList.add('active');
                } catch (err) {
                    app.showToast('Erreur caméra: ' + err.message, 'error');
                    this.showManualInput();
                }
            },

            async capturePlate() {
                const video = document.querySelector('#cameraPreview video');
                if (!video) return;

                // Show loading
                app.showToast('📸 Capture et analyse en cours...', 'success');
                
                // Disable capture button during processing
                const captureBtn = document.getElementById('captureBtn');
                captureBtn.disabled = true;
                captureBtn.textContent = '⏳ Analyse...';

                try {
                    // Create canvas with video dimensions
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth || 1280;
                    canvas.height = video.videoHeight || 720;
                    const ctx = canvas.getContext('2d');
                    
                    // Draw video frame
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Preprocess image for better OCR
                    const processedCanvas = this.preprocessImage(canvas);
                    
                    // Configure Tesseract with optimized settings
                    const result = await Tesseract.recognize(processedCanvas, 'fra', {
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                        tessedit_pageseg_mode: '7', // Treat as single text line
                        preserve_interword_spaces: '0',
                        user_defined_dpi: '300'
                    });

                    const rawText = result.data.text;
                    console.log('OCR Raw result:', rawText);
                    
                    // Try multiple pattern matching strategies
                    const plate = this.extractPlateNumber(rawText);
                    
                    if (plate) {
                        this.plateNumber = plate;
                        document.getElementById('plateResult').textContent = this.plateNumber;
                        document.getElementById('plateResult').classList.remove('hidden');
                        document.getElementById('confirmPlateBtn').classList.remove('hidden');
                        app.showToast('✅ Plaque détectée: ' + this.plateNumber, 'success');
                        
                        // Stop camera
                        this.stopCamera();
                    } else {
                        // Show raw result for debugging
                        console.log('No plate pattern found in:', rawText);
                        app.showToast('❌ Plaque non reconnue. Essayez avec plus de lumière ou saisissez manuellement.', 'error');
                        
                        // Show preview of what was captured
                        this.showCapturePreview(processedCanvas);
                    }
                } catch (err) {
                    console.error('OCR Error:', err);
                    app.showToast('❌ Erreur OCR: ' + err.message, 'error');
                } finally {
                    captureBtn.disabled = false;
                    captureBtn.textContent = '📸 Capturer';
                }
            },

            preprocessImage(sourceCanvas) {
                const canvas = document.createElement('canvas');
                
                // Ensure valid dimensions
                let srcWidth = sourceCanvas.width || 1280;
                let srcHeight = sourceCanvas.height || 720;
                
                if (srcWidth === 0 || srcHeight === 0) {
                    srcWidth = 1280;
                    srcHeight = 720;
                }
                
                const size = Math.min(srcWidth, srcHeight, 1920);
                const destWidth = Math.max(1, Math.floor(size));
                const destHeight = Math.max(1, Math.floor(size * 0.4)); // Plaque format is wide
                
                canvas.width = destWidth;
                canvas.height = destHeight;
                
                const ctx = canvas.getContext('2d');
                
                // Fill white background
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, destWidth, destHeight);
                
                // Center crop - plaque is usually in the middle horizontally
                const sx = Math.floor(srcWidth * 0.1);
                const sy = Math.floor(srcHeight * 0.3);
                const sWidth = Math.floor(srcWidth * 0.8);
                const sHeight = Math.floor(srcHeight * 0.4);
                
                ctx.drawImage(sourceCanvas, sx, sy, sWidth, sHeight, 0, 0, destWidth, destHeight);
                
                // Get image data for processing (ensure valid dimensions)
                const safeWidth = Math.min(destWidth, canvas.width);
                const safeHeight = Math.min(destHeight, canvas.height);
                const imageData = ctx.getImageData(0, 0, safeWidth, safeHeight);
                const data = imageData.data;
                
                // Convert to grayscale and increase contrast
                for (let i = 0; i < data.length; i += 4) {
                    // Grayscale
                    const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                    
                    // Increase contrast (threshold-like)
                    const contrast = gray > 100 ? 255 : 0;
                    
                    data[i] = contrast;     // R
                    data[i + 1] = contrast; // G
                    data[i + 2] = contrast; // B
                }
                
                ctx.putImageData(imageData, 0, 0);
                
                return canvas;
            },

            extractPlateNumber(text) {
                if (!text) return null;
                
                // Clean text - keep only alphanumeric and common separators
                const cleaned = text.toUpperCase()
                    .replace(/[^A-Z0-9\s\-_.]/g, '')
                    .replace(/[\s_.]+/g, '-');
                
                console.log('Cleaned text:', cleaned);
                
                // Multiple pattern attempts (French plates SIV format: AB-123-CD)
                const patterns = [
                    // Standard format: AB-123-CD
                    /([A-Z]{2})[-\s]?([0-9]{3})[-\s]?([A-Z]{2})/,
                    // Without separators: AB123CD
                    /([A-Z]{2})([0-9]{3})([A-Z]{2})/,
                    // Old format: 123-ABC-45
                    /([0-9]{3})[-\s]?([A-Z]{3})[-\s]?([0-9]{2})/,
                    // FNI format: ABC-123-DE
                    /([A-Z]{3})[-\s]?([0-9]{3})[-\s]?([A-Z]{2})/,
                    // Any 7+ alphanumeric that looks like a plate
                    /([A-Z0-9]{2,3}[-\s]?[0-9]{2,3}[-\s]?[A-Z]{2,3})/
                ];
                
                for (const pattern of patterns) {
                    const match = cleaned.match(pattern);
                    if (match) {
                        // Format as standard XX-XXX-XX
                        if (match[1] && match[2] && match[3]) {
                            return `${match[1]}-${match[2]}-${match[3]}`;
                        }
                        // If single capture group
                        if (match[1] && match[0] === match[1]) {
                            const formatted = this.formatPlate(match[1]);
                            if (formatted) return formatted;
                        }
                    }
                }
                
                // Last resort: look for any sequence that could be a plate
                const sequences = cleaned.split(/[-\s]+/).filter(s => s.length >= 2);
                for (let i = 0; i < sequences.length - 2; i++) {
                    const possiblePlate = `${sequences[i]}-${sequences[i+1]}-${sequences[i+2]}`;
                    if (/[A-Z]{2}-[0-9]{3}-[A-Z]{2}/.test(possiblePlate)) {
                        return possiblePlate;
                    }
                }
                
                return null;
            },

            formatPlate(text) {
                // Try to format any text as a plate
                const cleaned = text.replace(/[^A-Z0-9]/g, '');
                
                if (cleaned.length === 7) {
                    // Likely XX123XX format
                    return `${cleaned.slice(0,2)}-${cleaned.slice(2,5)}-${cleaned.slice(5,7)}`;
                }
                
                if (cleaned.length === 9) {
                    // Old format XXX123XX
                    return `${cleaned.slice(0,3)}-${cleaned.slice(3,6)}-${cleaned.slice(6,9)}`;
                }
                
                return null;
            },

            showCapturePreview(canvas) {
                // Show a preview of what was captured for debugging
                const preview = document.getElementById('cameraPreview');
                preview.innerHTML = '';
                
                const container = document.createElement('div');
                container.style.cssText = 'text-align: center; padding: 1rem;';
                
                const img = document.createElement('img');
                img.src = canvas.toDataURL('image/jpeg');
                img.style.cssText = 'max-width: 100%; border-radius: 8px; margin-bottom: 1rem;';
                
                const msg = document.createElement('p');
                msg.textContent = 'Image capturée. Vous pouvez saisir la plaque manuellement.';
                msg.style.color = 'var(--text-muted)';
                
                container.appendChild(img);
                container.appendChild(msg);
                preview.appendChild(container);
            },

            stopCamera() {
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
                document.getElementById('scannerOverlay').classList.add('hidden');
                document.getElementById('captureBtn').classList.add('hidden');
                document.getElementById('scannerContainer').classList.remove('active');
            },

            showManualInput() {
                this.stopCamera();
                document.getElementById('manualInputGroup').classList.remove('hidden');
                document.getElementById('confirmPlateBtn').classList.remove('hidden');
                document.getElementById('startCameraBtn').classList.add('hidden');
                document.getElementById('captureBtn').classList.add('hidden');
            },

            goToStep(step) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`step${step}`).classList.remove('hidden');
                this.currentStep = step;
                window.scrollTo(0, 0);
            },

            confirmStep2() {
                const school = document.getElementById('schoolName').value;
                const city = document.getElementById('city').value;
                const postal = document.getElementById('postalCode').value;
                const children = document.getElementById('childrenCount').value;
                const adults = document.getElementById('adultsCount').value;

                if (!school || !city || !postal || !children || !adults) {
                    app.showToast('Veuillez remplir tous les champs obligatoires', 'error');
                    return;
                }

                this.goToStep(3);
            },

            async validateGroup() {
                const leaderLastName = document.getElementById('leaderLastName').value;
                const leaderFirstName = document.getElementById('leaderFirstName').value;
                
                if (!leaderLastName || !leaderFirstName) {
                    app.showToast('Veuillez indiquer le nom et prénom du responsable', 'error');
                    return;
                }

                // Check signature
                const canvas = document.getElementById('signaturePad');
                if (!canvas || canvas.width === 0 || canvas.height === 0) {
                    app.showToast('Erreur: canvas de signature non initialisé', 'error');
                    return;
                }
                
                const ctx = canvas.getContext('2d');
                let hasSignature = false;
                
                try {
                    const safeWidth = Math.max(1, canvas.width);
                    const safeHeight = Math.max(1, canvas.height);
                    const imageData = ctx.getImageData(0, 0, safeWidth, safeHeight);
                    hasSignature = imageData.data.some(channel => channel !== 0);
                } catch (err) {
                    console.error('Error checking signature:', err);
                    // Assume no signature if we can't read the canvas
                    hasSignature = false;
                }

                if (!hasSignature) {
                    app.showToast('La signature est obligatoire', 'error');
                    return;
                }

                // Generate group data
                const now = new Date();
                const groupData = {
                    plateNumber: this.plateNumber,
                    schoolName: document.getElementById('schoolName').value,
                    city: document.getElementById('city').value,
                    postalCode: document.getElementById('postalCode').value,
                    childrenCount: parseInt(document.getElementById('childrenCount').value),
                    adultsCount: parseInt(document.getElementById('adultsCount').value),
                    leaderLastName,
                    leaderFirstName,
                    arrivalTime: now.toISOString(),
                    activities: {},
                    status: 'registered'
                };

                try {
                    // Save to Firestore
                    const groupId = await app.saveGroup(groupData);
                    
                    // Display QR code
                    this.displayQRCode(groupId, groupData);
                    this.goToStep(4);
                    
                    app.showToast('Groupe enregistré avec succès!', 'success');
                } catch (err) {
                    app.showToast('Erreur lors de l\'enregistrement: ' + err.message, 'error');
                }
            },

            displayQRCode(groupId, data) {
                document.getElementById('groupId').textContent = groupId;
                document.getElementById('groupSchool').textContent = data.schoolName;
                document.getElementById('groupLeader').textContent = 
                    `Responsable: ${data.leaderFirstName} ${data.leaderLastName}`;
                document.getElementById('groupTime').textContent = 
                    `Arrivée: ${new Date(data.arrivalTime).toLocaleString('fr-FR')}`;

                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                new QRCode(qrContainer, {
                    text: groupId,
                    width: 200,
                    height: 200,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            },

            reset() {
                // Reset all fields
                document.querySelectorAll('input').forEach(input => input.value = '');
                this.clearSignature();
                this.plateNumber = '';
                document.getElementById('plateResult').classList.add('hidden');
                document.getElementById('confirmPlateBtn').classList.add('hidden');
                document.getElementById('manualInputGroup').classList.add('hidden');
                document.getElementById('startCameraBtn').classList.remove('hidden');
                document.getElementById('cameraPreview').innerHTML = 
                    '<p>Cliquez sur "Démarrer la caméra" pour scanner</p>';
                
                this.goToStep(1);
            }
        };

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            agent.init();
        });
    </script>
</body>
</html>
