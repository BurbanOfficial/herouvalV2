<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkBus • Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root { --primary: 59 130 246; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); }
        
        #camera-feed { height: 320px; }
        .scan-frame {
            position: absolute;
            inset: 30px;
            border: 3px solid rgba(59, 130, 246, 0.7);
            border-radius: 16px;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.85);
            animation: scanPulse 2.5s infinite;
        }
        @keyframes scanPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
        
        input, button { font-size: 1.1rem; }
        .input-modern:focus {
            box-shadow: 0 0 0 5px rgb(59 130 246 / 0.3);
            transform: scale(1.03);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen pb-8">

    <nav class="glass border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-bus text-blue-500 text-3xl"></i>
                <div class="logo-font text-2xl font-semibold tracking-tighter">ParkBus</div>
            </div>
            <div class="text-xs bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-3xl border border-emerald-500/30 font-mono">
                TERMINAL AGENT
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 pt-8">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 shadow-2xl">
            <h1 class="text-2xl font-semibold mb-2">Enregistrement Bus</h1>
            <p class="text-slate-400 mb-8">Scan de plaque • Signature</p>

            <!-- Camera -->
            <div class="relative rounded-3xl overflow-hidden bg-black border border-slate-700 mb-8">
                <video id="camera-feed" autoplay playsinline class="w-full object-cover"></video>
                <div class="scan-frame"></div>
                
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2">
                    <button onclick="scanPlate()" id="btn-scan"
                            class="flex items-center gap-x-3 bg-white text-slate-900 font-semibold px-8 py-4 rounded-2xl shadow-xl active:scale-95 transition-all">
                        <i class="fa-solid fa-camera"></i>
                        <span>Scanner la plaque</span>
                    </button>
                </div>
            </div>

            <form id="bus-form" class="space-y-7">
                <div>
                    <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Plaque</label>
                    <input type="text" id="plaque" 
                           class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-5 text-2xl font-mono text-center uppercase"
                           placeholder="AB-123-CD" required>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Couleur</label>
                        <input type="text" id="couleur" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4" placeholder="Bleu" required>
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">École</label>
                        <input type="text" id="ecole" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4" placeholder="Établissement" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">CP</label>
                        <input type="text" id="cp" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4" placeholder="75000" required>
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Ville</label>
                        <input type="text" id="ville" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4" placeholder="Paris" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Enfants</label>
                        <input type="number" id="nb_enfants" value="0" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4 text-center text-2xl" required>
                    </div>
                    <div>
                        <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Adultes</label>
                        <input type="number" id="nb_adultes" value="0" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4 text-center text-2xl" required>
                    </div>
                </div>

                <div>
                    <label class="text-xs uppercase tracking-widest text-slate-400 mb-2 block">Responsable</label>
                    <input type="text" id="responsable" class="input-modern w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4" placeholder="Nom du responsable" required>
                </div>

                <!-- Signature -->
                <div>
                    <label class="text-xs uppercase tracking-widest text-slate-400 mb-3 block">Signature</label>
                    <div class="bg-white border-2 border-dashed border-slate-300 rounded-2xl p-3">
                        <canvas id="signature-pad" class="w-full h-44 bg-white rounded-xl cursor-crosshair touch-manipulation"></canvas>
                    </div>
                    <button type="button" onclick="clearSignature()" class="mt-3 text-red-400 flex items-center gap-2 text-sm">
                        <i class="fa-solid fa-eraser"></i> Effacer
                    </button>
                </div>

                <button type="submit" id="btn-submit"
                        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-6 rounded-3xl text-lg font-semibold shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-paper-plane"></i>
                    VALIDER & ENVOYER
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        // Firebase imports (à compléter avec tes clés)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = { /* TES CLÉS ICI */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Camera + OCR
        let stream = null;
        const video = document.getElementById('camera-feed');

        async function startCamera() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        }

        window.scanPlate = async () => {
            const btn = document.getElementById('btn-scan');
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Analyse...`;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'fra');
                const match = text.match(/[A-Z]{2}[-.\s]?[0-9]{3}[-.\s]?[A-Z]{2}/i);
                if (match) {
                    document.getElementById('plaque').value = match[0].toUpperCase().replace(/[\s.]/g, '-');
                    alert("✅ Plaque détectée !");
                } else {
                    alert("Aucune plaque détectée. Saisissez manuellement.");
                }
            } catch(e) { alert("Erreur OCR"); }
            
            btn.innerHTML = `<i class="fa-solid fa-camera"></i> Scanner la plaque`;
        };

        // Signature
        const canvasSig = document.getElementById('signature-pad');
        const ctx = canvasSig.getContext('2d');
        let isDrawing = false;

        function resizeCanvas() {
            const ratio = window.devicePixelRatio || 1;
            canvasSig.width = canvasSig.offsetWidth * ratio;
            canvasSig.height = canvasSig.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 3.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e2937';
        }

        // Gestion du dessin (souris + tactile)
        const draw = (e) => {
            if (!isDrawing) return;
            const rect = canvasSig.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        };

        canvasSig.addEventListener('mousedown', () => isDrawing = true);
        canvasSig.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvasSig.addEventListener('mousemove', draw);
        canvasSig.addEventListener('touchstart', () => isDrawing = true);
        canvasSig.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });
        canvasSig.addEventListener('touchmove', draw);

        window.clearSignature = () => ctx.clearRect(0, 0, canvasSig.width, canvasSig.height);

        // Formulaire
        document.getElementById('bus-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Enregistrement...`;

            try {
                const signatureDataUrl = canvasSig.toDataURL('image/png');
                const signatureRef = ref(storage, `signatures/${Date.now()}.png`);
                await uploadString(signatureRef, signatureDataUrl, 'data_url');
                const signatureUrl = await getDownloadURL(signatureRef);

                await addDoc(collection(db, "buses"), {
                    timestamp: new Date(),
                    plaque: document.getElementById('plaque').value,
                    couleur: document.getElementById('couleur').value,
                    ecole: document.getElementById('ecole').value,
                    cp: document.getElementById('cp').value,
                    ville: document.getElementById('ville').value,
                    nb_enfants: parseInt(document.getElementById('nb_enfants').value) || 0,
                    nb_adultes: parseInt(document.getElementById('nb_adultes').value) || 0,
                    responsable: document.getElementById('responsable').value,
                    signature_url: signatureUrl
                });

                alert("✅ Bus enregistré avec succès !");
                e.target.reset();
                clearSignature();
            } catch (err) {
                alert("Erreur lors de l'enregistrement");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> VALIDER & ENVOYER`;
            }
        });

        // Init
        startCamera();
        setTimeout(resizeCanvas, 300);
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
