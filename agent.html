<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent - Enregistrement Bus</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Retour</a>
            <h1>🚌 Enregistrement d'un Bus</h1>
            <div></div>
        </header>

        <!-- Étape 1: Scan Plaque -->
        <section id="step1" class="form-container">
            <h2 class="mb-2">Étape 1 : Plaque d'immatriculation</h2>
            
            <div class="scanner-container" id="scannerContainer">
                <div class="camera-preview" id="cameraPreview">
                    <p>Cliquez sur "Démarrer la caméra" pour scanner</p>
                </div>
                <div class="scanner-overlay hidden" id="scannerOverlay">
                    <div class="scanner-line"></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="startCameraBtn">
                    📷 Démarrer la caméra
                </button>
                <button class="btn btn-secondary hidden" id="captureBtn">
                    📸 Capturer
                </button>
                <button class="btn btn-outline" id="manualBtn">
                    ⌨️ Saisir manuellement
                </button>
            </div>

            <div class="scanner-result hidden" id="plateResult"></div>

            <div class="form-group hidden" id="manualInputGroup">
                <label for="manualPlate">Plaque d'immatriculation</label>
                <input type="text" id="manualPlate" placeholder="AB-123-CD">
            </div>

            <button class="btn btn-success btn-block hidden" id="confirmPlateBtn">
                Confirmer et continuer →
            </button>
        </section>

        <!-- Étape 2: Informations Groupe -->
        <section id="step2" class="form-container hidden">
            <h2 class="mb-2">Étape 2 : Informations du groupe</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="schoolName">Nom de l'école/organisation *</label>
                    <input type="text" id="schoolName" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">Ville *</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label for="postalCode">Code postal *</label>
                    <input type="text" id="postalCode" pattern="[0-9]{5}" maxlength="5" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="childrenCount">Nombre d'enfants *</label>
                    <input type="number" id="childrenCount" min="1" required>
                </div>
                <div class="form-group">
                    <label for="adultsCount">Nombre d'accompagnateurs *</label>
                    <input type="number" id="adultsCount" min="1" required>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" id="backToStep1">← Retour</button>
                <button class="btn btn-success" id="confirmStep2">
                    Continuer →
                </button>
            </div>
        </section>

        <!-- Étape 3: Responsable et Signature -->
        <section id="step3" class="form-container hidden">
            <h2 class="mb-2">Étape 3 : Responsable de la sortie</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="leaderLastName">Nom du responsable *</label>
                    <input type="text" id="leaderLastName" required>
                </div>
                <div class="form-group">
                    <label for="leaderFirstName">Prénom du responsable *</label>
                    <input type="text" id="leaderFirstName" required>
                </div>
            </div>

            <div class="form-group">
                <label>Signature du responsable *</label>
                <div class="signature-container">
                    <canvas id="signaturePad"></canvas>
                </div>
                <button class="btn btn-outline btn-sm" id="clearSignature" style="margin-top: 0.5rem;">
                    Effacer la signature
                </button>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" id="backToStep2">← Retour</button>
                <button class="btn btn-success" id="validateGroup">
                    ✓ Valider le groupe
                </button>
            </div>
        </section>

        <!-- Étape 4: QR Code Généré -->
        <section id="step4" class="form-container hidden">
            <h2 class="text-center mb-2">Groupe Enregistré !</h2>
            
            <div class="qr-display">
                <div id="qrcode"></div>
                <div class="group-info">
                    <div class="group-id" id="groupId"></div>
                    <p id="groupSchool"></p>
                    <p id="groupLeader"></p>
                    <p id="groupTime"></p>
                </div>
            </div>

            <p class="text-center" style="color: var(--text-muted); margin-bottom: 1rem;">
                Ce QR code a été envoyé à la caisse. L'impression se fait à l'accueil.
            </p>

            <button class="btn btn-primary btn-block" id="newRegistration">
                + Nouvel enregistrement
            </button>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        // Agent-specific code
        const agent = {
            currentStep: 1,
            plateNumber: '',
            stream: null,
            
            init() {
                this.setupEventListeners();
                this.setupSignaturePad();
            },

            setupEventListeners() {
                document.getElementById('startCameraBtn').addEventListener('click', () => this.startCamera());
                document.getElementById('captureBtn').addEventListener('click', () => this.capturePlate());
                document.getElementById('manualBtn').addEventListener('click', () => this.showManualInput());
                document.getElementById('confirmPlateBtn').addEventListener('click', () => this.goToStep(2));
                document.getElementById('backToStep1').addEventListener('click', () => this.goToStep(1));
                document.getElementById('confirmStep2').addEventListener('click', () => this.confirmStep2());
                document.getElementById('backToStep2').addEventListener('click', () => this.goToStep(2));
                document.getElementById('validateGroup').addEventListener('click', () => this.validateGroup());
                document.getElementById('clearSignature').addEventListener('click', () => this.clearSignature());
                document.getElementById('newRegistration').addEventListener('click', () => this.reset());

                // Manual plate input
                document.getElementById('manualPlate').addEventListener('input', (e) => {
                    this.plateNumber = e.target.value.toUpperCase();
                    document.getElementById('plateResult').textContent = this.plateNumber;
                });
            },

            setupSignaturePad() {
                const canvas = document.getElementById('signaturePad');
                const ctx = canvas.getContext('2d');
                let drawing = false;

                // Set canvas size
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';

                const startDrawing = (e) => {
                    drawing = true;
                    const { x, y } = this.getCoordinates(e, canvas);
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                };

                const draw = (e) => {
                    if (!drawing) return;
                    const { x, y } = this.getCoordinates(e, canvas);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                };

                const stopDrawing = () => {
                    drawing = false;
                };

                canvas.addEventListener('mousedown', startDrawing);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', stopDrawing);
                canvas.addEventListener('mouseout', stopDrawing);

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startDrawing(e);
                });
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    draw(e);
                });
                canvas.addEventListener('touchend', stopDrawing);
            },

            getCoordinates(e, canvas) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            },

            clearSignature() {
                const canvas = document.getElementById('signaturePad');
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            },

            async startCamera() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    
                    const preview = document.getElementById('cameraPreview');
                    const video = document.createElement('video');
                    video.srcObject = this.stream;
                    video.autoplay = true;
                    video.playsInline = true;
                    
                    preview.innerHTML = '';
                    preview.appendChild(video);
                    
                    document.getElementById('scannerOverlay').classList.remove('hidden');
                    document.getElementById('startCameraBtn').classList.add('hidden');
                    document.getElementById('captureBtn').classList.remove('hidden');
                    document.getElementById('scannerContainer').classList.add('active');
                } catch (err) {
                    app.showToast('Erreur caméra: ' + err.message, 'error');
                    this.showManualInput();
                }
            },

            async capturePlate() {
                const video = document.querySelector('#cameraPreview video');
                if (!video) return;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                // Show loading
                app.showToast('Analyse de la plaque en cours...', 'success');

                try {
                    const result = await Tesseract.recognize(canvas, 'fra', {
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
                    });

                    const text = result.data.text.toUpperCase().replace(/[^A-Z0-9-]/g, '');
                    
                    // French plate format validation (simplified)
                    const plateMatch = text.match(/[A-Z]{2}[-]?[0-9]{3}[-]?[A-Z]{2}/);
                    
                    if (plateMatch) {
                        this.plateNumber = plateMatch[0];
                        document.getElementById('plateResult').textContent = this.plateNumber;
                        document.getElementById('plateResult').classList.remove('hidden');
                        document.getElementById('confirmPlateBtn').classList.remove('hidden');
                        app.showToast('Plaque détectée: ' + this.plateNumber, 'success');
                        
                        // Stop camera
                        this.stopCamera();
                    } else {
                        app.showToast('Plaque non reconnue, veuillez réessayer ou saisir manuellement', 'error');
                    }
                } catch (err) {
                    app.showToast('Erreur OCR: ' + err.message, 'error');
                }
            },

            stopCamera() {
                if (this.stream) {
                    this.stream.getTracks().forEach(track => track.stop());
                    this.stream = null;
                }
                document.getElementById('scannerOverlay').classList.add('hidden');
                document.getElementById('captureBtn').classList.add('hidden');
                document.getElementById('scannerContainer').classList.remove('active');
            },

            showManualInput() {
                this.stopCamera();
                document.getElementById('manualInputGroup').classList.remove('hidden');
                document.getElementById('confirmPlateBtn').classList.remove('hidden');
                document.getElementById('startCameraBtn').classList.add('hidden');
                document.getElementById('captureBtn').classList.add('hidden');
            },

            goToStep(step) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`step${step}`).classList.remove('hidden');
                this.currentStep = step;
                window.scrollTo(0, 0);
            },

            confirmStep2() {
                const school = document.getElementById('schoolName').value;
                const city = document.getElementById('city').value;
                const postal = document.getElementById('postalCode').value;
                const children = document.getElementById('childrenCount').value;
                const adults = document.getElementById('adultsCount').value;

                if (!school || !city || !postal || !children || !adults) {
                    app.showToast('Veuillez remplir tous les champs obligatoires', 'error');
                    return;
                }

                this.goToStep(3);
            },

            async validateGroup() {
                const leaderLastName = document.getElementById('leaderLastName').value;
                const leaderFirstName = document.getElementById('leaderFirstName').value;
                
                if (!leaderLastName || !leaderFirstName) {
                    app.showToast('Veuillez indiquer le nom et prénom du responsable', 'error');
                    return;
                }

                // Check signature
                const canvas = document.getElementById('signaturePad');
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const hasSignature = imageData.data.some(channel => channel !== 0);

                if (!hasSignature) {
                    app.showToast('La signature est obligatoire', 'error');
                    return;
                }

                // Generate group data
                const now = new Date();
                const groupData = {
                    plateNumber: this.plateNumber,
                    schoolName: document.getElementById('schoolName').value,
                    city: document.getElementById('city').value,
                    postalCode: document.getElementById('postalCode').value,
                    childrenCount: parseInt(document.getElementById('childrenCount').value),
                    adultsCount: parseInt(document.getElementById('adultsCount').value),
                    leaderLastName,
                    leaderFirstName,
                    arrivalTime: now.toISOString(),
                    activities: {},
                    status: 'registered'
                };

                try {
                    // Save to Firestore
                    const groupId = await app.saveGroup(groupData);
                    
                    // Display QR code
                    this.displayQRCode(groupId, groupData);
                    this.goToStep(4);
                    
                    app.showToast('Groupe enregistré avec succès!', 'success');
                } catch (err) {
                    app.showToast('Erreur lors de l\'enregistrement: ' + err.message, 'error');
                }
            },

            displayQRCode(groupId, data) {
                document.getElementById('groupId').textContent = groupId;
                document.getElementById('groupSchool').textContent = data.schoolName;
                document.getElementById('groupLeader').textContent = 
                    `Responsable: ${data.leaderFirstName} ${data.leaderLastName}`;
                document.getElementById('groupTime').textContent = 
                    `Arrivée: ${new Date(data.arrivalTime).toLocaleString('fr-FR')}`;

                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                new QRCode(qrContainer, {
                    text: groupId,
                    width: 200,
                    height: 200,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            },

            reset() {
                // Reset all fields
                document.querySelectorAll('input').forEach(input => input.value = '');
                this.clearSignature();
                this.plateNumber = '';
                document.getElementById('plateResult').classList.add('hidden');
                document.getElementById('confirmPlateBtn').classList.add('hidden');
                document.getElementById('manualInputGroup').classList.add('hidden');
                document.getElementById('startCameraBtn').classList.remove('hidden');
                document.getElementById('cameraPreview').innerHTML = 
                    '<p>Cliquez sur "Démarrer la caméra" pour scanner</p>';
                
                this.goToStep(1);
            }
        };

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            agent.init();
        });
    </script>
</body>
</html>
