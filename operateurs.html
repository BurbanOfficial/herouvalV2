<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opérateurs - Scan QR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Retour
            </a>
            <h1>Opérateurs</h1>
            <div></div>
        </header>

        <!-- Sélection de l'attraction -->
        <section id="attractionSelect" class="form-container">
            <h2 class="mb-2">Sélectionnez votre attraction</h2>
            
            <div class="form-group">
                <label for="operatorAttraction">Votre poste</label>
                <select id="operatorAttraction" class="form-control">
                    <option value="">-- Choisir une attraction --</option>
                    <option value="karting">Karting</option>
                    <option value="laser_game">Laser Game</option>
                    <option value="escape_game">Escape Game</option>
                    <option value="vr_experience">VR Expérience</option>
                    <option value="tyrolienne">Tyrolienne</option>
                    <option value="climbing">Escalade</option>
                </select>
            </div>

            <button class="btn btn-primary btn-block" id="confirmAttraction">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 0.5rem;">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Confirmer et ouvrir le scanner
            </button>
        </section>

        <!-- Scanner QR -->
        <section id="scannerSection" class="form-container hidden">
            <!-- Attraction header -->
            <div class="attraction-header" id="attractionHeader">
                <div class="attraction-header-label">Attraction</div>
                <div class="attraction-header-name" id="attractionName"></div>
            </div>

            <!-- Scanned group info (hidden initially) -->
            <div class="scanned-group-info hidden" id="scannedGroupInfo">
                <div class="scanned-group-label">Groupe scanné</div>
                <div class="scanned-group-name" id="scannedGroupName"></div>
            </div>

            <div class="scanner-container" id="qrScanner">
                <div id="reader" style="width: 100%; max-width: 600px; margin: 0 auto;"></div>
            </div>

            <div style="text-align: center; margin-top: 1rem;">
                <button class="btn btn-outline" id="changeAttraction">
                    Changer d'attraction
                </button>
            </div>
        </section>

        <!-- Résultat de validation -->
        <section id="validationResult" class="hidden">
            <div class="operator-status" id="statusContainer">
                <!-- Animated SVG icon container -->
                <div class="status-icon-animated" id="statusIconContainer">
                    <svg viewBox="0 0 100 100" id="statusSvg">
                        <!-- Circle and paths will be injected by JS -->
                    </svg>
                </div>
                <div class="status-text" id="statusText">
                    En attente du scan...
                </div>
            </div>

            <div class="group-validation-info hidden" id="groupInfo">
                <h3 style="margin-bottom: 1.5rem; font-weight: 400;">Informations du groupe</h3>
                
                <div class="validation-row">
                    <span>Groupe:</span>
                    <strong id="valGroupId"></strong>
                </div>
                <div class="validation-row">
                    <span>École:</span>
                    <strong id="valSchool"></strong>
                </div>
                <div class="validation-row">
                    <span>Responsable:</span>
                    <strong id="valLeader"></strong>
                </div>
                <div class="validation-row">
                    <span>Total personnes:</span>
                    <strong id="valTotal"></strong>
                </div>

                <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
                    <div class="validation-row">
                        <span>Attraction:</span>
                        <strong id="valAttraction"></strong>
                    </div>
                    <div class="validation-row">
                        <span>Places autorisées:</span>
                        <strong id="valAllowed" style="color: #22c55e; font-size: 1.2rem;"></strong>
                    </div>
                    <div class="validation-row">
                        <span>Places déjà utilisées:</span>
                        <strong id="valUsed"></strong>
                    </div>
                    <div class="validation-row">
                        <span>Places restantes:</span>
                        <strong id="valRemaining" style="color: var(--black); font-size: 1.3rem;"></strong>
                    </div>
                </div>
            </div>

            <div class="form-container hidden" id="activitiesContainer">
                <h3 class="mb-2">Activités disponibles pour ce groupe</h3>
                <div id="activitiesList" class="activities-grid">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <div class="btn-group" id="actionButtons" style="display: none;">
                <button class="btn btn-success btn-block" id="validateEntry">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.5rem;">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Valider l'entrée
                </button>
            </div>

            <button class="btn btn-outline btn-block mt-2" id="scanNext" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 0.5rem;">
                    <rect x="3" y="7" width="18" height="12" rx="2"/>
                    <circle cx="12" cy="13" r="3"/>
                </svg>
                Scanner un autre groupe
            </button>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        const operateur = {
            selectedAttraction: '',
            selectedAttractionName: '',
            currentGroup: null,
            html5QrCode: null,
            activities: {
                karting: 'Karting',
                laser_game: 'Laser Game',
                escape_game: 'Escape Game',
                vr_experience: 'VR Expérience',
                tyrolienne: 'Tyrolienne',
                climbing: 'Escalade'
            },

            init() {
                this.setupEventListeners();
            },

            setupEventListeners() {
                document.getElementById('confirmAttraction').addEventListener('click', () => {
                    this.confirmAttraction();
                });

                document.getElementById('changeAttraction').addEventListener('click', () => {
                    this.resetAttraction();
                });

                document.getElementById('validateEntry').addEventListener('click', () => {
                    this.validateEntry();
                });

                document.getElementById('scanNext').addEventListener('click', () => {
                    this.resetScan();
                });
            },

            confirmAttraction() {
                const select = document.getElementById('operatorAttraction');
                this.selectedAttraction = select.value;
                this.selectedAttractionName = select.options[select.selectedIndex].text;

                if (!this.selectedAttraction) {
                    app.showToast('Veuillez sélectionner une attraction', 'error');
                    return;
                }

                // Show attraction name in header
                document.getElementById('attractionName').textContent = this.selectedAttractionName;

                document.getElementById('attractionSelect').classList.add('hidden');
                document.getElementById('scannerSection').classList.remove('hidden');
                document.getElementById('validationResult').classList.remove('hidden');

                this.startScanner();
            },

            startScanner() {
                const reader = document.getElementById('reader');
                reader.innerHTML = '';

                this.html5QrCode = new Html5Qrcode('reader');
                
                const config = { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 } 
                };

                this.html5QrCode.start(
                    { facingMode: 'environment' },
                    config,
                    (decodedText) => {
                        this.onScanSuccess(decodedText);
                    },
                    (error) => {
                        // Ignore scan errors (no QR in frame)
                    }
                ).catch(err => {
                    app.showToast('Erreur caméra: ' + err.message, 'error');
                });
            },

            stopScanner() {
                if (this.html5QrCode) {
                    this.html5QrCode.stop().then(() => {
                        this.html5QrCode = null;
                    }).catch(() => {});
                }
            },

            async onScanSuccess(groupId) {
                // Stop scanning temporarily
                this.stopScanner();

                try {
                    const group = await app.getGroup(groupId);
                    
                    if (!group) {
                        this.showStatus('Groupe non trouvé', 'denied');
                        return;
                    }

                    this.currentGroup = group;
                    
                    // Hide scanner container after successful scan
                    document.getElementById('qrScanner').classList.add('hidden');
                    
                    // Show scanned group info with group ID instead of school name
                    document.getElementById('scannedGroupInfo').classList.remove('hidden');
                    document.getElementById('scannedGroupName').textContent = group.id;
                    
                    this.validateGroupAccess(group);

                } catch (err) {
                    app.showToast('Erreur: ' + err.message, 'error');
                    this.resetScan();
                }
            },

            validateGroupAccess(group) {
                const activity = group.activities && group.activities[this.selectedAttraction];
                
                // Fill group info
                document.getElementById('valGroupId').textContent = group.id;
                document.getElementById('valSchool').textContent = group.schoolName;
                document.getElementById('valLeader').textContent = 
                    `${group.leaderFirstName} ${group.leaderLastName}`;
                document.getElementById('valTotal').textContent = 
                    group.childrenCount + group.adultsCount;
                document.getElementById('valAttraction').textContent = this.selectedAttractionName;

                document.getElementById('groupInfo').classList.remove('hidden');

                if (!activity) {
                    // No activity booked
                    document.getElementById('valAllowed').textContent = '0';
                    document.getElementById('valUsed').textContent = '0';
                    document.getElementById('valRemaining').textContent = '0';
                    
                    this.showStatus('ACCÈS REFUSÉ - Activité non payée', 'denied');
                    this.showActivitiesList(group);
                    
                    document.getElementById('actionButtons').style.display = 'none';
                    document.getElementById('scanNext').style.display = 'block';
                    return;
                }

                const totalAllowed = activity.quantity;
                const used = activity.completed || 0;
                const remaining = totalAllowed - used;

                document.getElementById('valAllowed').textContent = totalAllowed;
                document.getElementById('valUsed').textContent = used;
                document.getElementById('valRemaining').textContent = remaining;

                if (remaining > 0) {
                    this.showStatus(`ACCÈS AUTORISÉ - ${remaining} places`, 'allowed');
                    document.getElementById('actionButtons').style.display = 'flex';
                } else {
                    this.showStatus('ACCÈS REFUSÉ - Quota épuisé', 'denied');
                    document.getElementById('actionButtons').style.display = 'none';
                }

                this.showActivitiesList(group);
                document.getElementById('scanNext').style.display = 'block';
            },

            showStatus(message, type) {
                const container = document.getElementById('statusContainer');
                const iconContainer = document.getElementById('statusIconContainer');
                const text = document.getElementById('statusText');
                const svg = document.getElementById('statusSvg');

                text.textContent = message;
                text.className = 'status-text ' + type;

                // Update SVG based on type
                iconContainer.className = 'status-icon-animated ' + type;
                
                if (type === 'allowed') {
                    // Green checkmark with circle
                    svg.innerHTML = `
                        <circle cx="50" cy="50" r="45" class="circle-path"/>
                        <path d="M30 52 L43 65 L70 38" class="check-path"/>
                    `;
                } else if (type === 'denied') {
                    // Red cross with circle
                    svg.innerHTML = `
                        <circle cx="50" cy="50" r="45" class="circle-path"/>
                        <path d="M35 35 L65 65 M65 35 L35 65" class="cross-path"/>
                    `;
                } else {
                    // Default - empty circle
                    svg.innerHTML = `
                        <circle cx="50" cy="50" r="45" stroke="var(--gray-400)" stroke-width="2" fill="none"/>
                    `;
                }
            },

            showActivitiesList(group) {
                const container = document.getElementById('activitiesList');
                container.innerHTML = '';

                const activitiesContainer = document.getElementById('activitiesContainer');
                
                if (!group.activities || Object.keys(group.activities).length === 0) {
                    activitiesContainer.classList.add('hidden');
                    return;
                }

                activitiesContainer.classList.remove('hidden');

                Object.entries(group.activities).forEach(([id, activity]) => {
                    const card = document.createElement('div');
                    const isCompleted = activity.completed >= activity.quantity;
                    const isCurrent = id === this.selectedAttraction;
                    
                    card.className = `activity-card ${isCompleted ? 'completed' : ''}`;
                    if (isCurrent) {
                        card.style.border = '2px solid var(--success)';
                    }

                    card.innerHTML = `
                        <div class="activity-header">
                            <span class="activity-title">${activity.name}</span>
                            <span class="activity-status ${isCompleted ? 'valid' : ''}"></span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">
                            ${activity.completed || 0} / ${activity.quantity} utilisés
                        </p>
                    `;

                    container.appendChild(card);
                });
            },

            async validateEntry() {
                if (!this.currentGroup) return;

                try {
                    const activity = this.currentGroup.activities[this.selectedAttraction];
                    const newCompleted = (activity.completed || 0) + 1;

                    // Update the activity count
                    const updatedActivities = { ...this.currentGroup.activities };
                    updatedActivities[this.selectedAttraction] = {
                        ...activity,
                        completed: newCompleted
                    };

                    await app.updateGroup(this.currentGroup.id, {
                        activities: updatedActivities
                    });

                    app.showToast('Entrée validée!', 'success');
                    
                    // Refresh display
                    this.currentGroup.activities = updatedActivities;
                    this.validateGroupAccess(this.currentGroup);

                } catch (err) {
                    app.showToast('Erreur: ' + err.message, 'error');
                }
            },

            resetScan() {
                document.getElementById('scannedGroupInfo').classList.add('hidden');
                document.getElementById('groupInfo').classList.add('hidden');
                document.getElementById('activitiesContainer').classList.add('hidden');
                document.getElementById('actionButtons').style.display = 'none';
                document.getElementById('scanNext').style.display = 'none';
                
                // Show scanner again for next scan
                document.getElementById('qrScanner').classList.remove('hidden');
                
                this.showStatus('En attente du scan...', '');
                
                this.startScanner();
            },

            resetAttraction() {
                this.stopScanner();
                this.selectedAttraction = '';
                this.currentGroup = null;
                
                document.getElementById('attractionSelect').classList.remove('hidden');
                document.getElementById('scannerSection').classList.add('hidden');
                document.getElementById('validationResult').classList.add('hidden');
                
                this.resetScan();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            operateur.init();
        });
    </script>
</body>
</html>
