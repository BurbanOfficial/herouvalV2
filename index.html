<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkBus Manager • v3.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
        
        :root {
            --primary: 59 130 246;
        }
        
        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        #camera-feed {
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8);
        }

        .scan-frame {
            position: absolute;
            inset: 40px;
            border: 3px solid rgba(59, 130, 246, 0.6);
            border-radius: 16px;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.75);
            animation: scanPulse 3s ease-in-out infinite;
        }

        @keyframes scanPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .input-modern {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-modern:focus {
            box-shadow: 0 0 0 4px rgb(59 130 246 / 0.2);
            transform: scale(1.02);
        }

        .nav-tab {
            position: relative;
        }
        
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: rgb(59 130 246);
            border-radius: 9999px;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        tr {
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background: rgba(59, 130, 246, 0.1) !important;
            transform: scale(1.01);
        }

        .signature-container {
            background: #f8fafc;
            border: 2px dashed #64748b;
            border-radius: 12px;
        }
    </style>
</head>
<body class="tail-container bg-slate-950 text-slate-200 min-h-screen pb-12">
    <!-- NAVBAR -->
    <nav class="glass border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-bus text-white text-2xl"></i>
                </div>
                <div>
                    <span class="logo-font text-3xl font-semibold tracking-tighter text-white">ParkBus</span>
                    <span class="text-xs text-slate-500 font-mono tracking-[2px] block -mt-1">MANAGER v3</span>
                </div>
            </div>
            
            <div class="flex bg-slate-900 rounded-3xl p-1 border border-slate-800">
                <button onclick="switchTab('agent')" id="tab-agent" 
                        class="nav-tab active px-8 py-3 rounded-3xl text-sm font-semibold flex items-center gap-x-2 transition-all">
                    <i class="fa-solid fa-camera"></i>
                    <span>Terminal Agent</span>
                </button>
                <button onclick="switchTab('caisse')" id="tab-caisse" 
                        class="nav-tab px-8 py-3 rounded-3xl text-sm font-semibold flex items-center gap-x-2 transition-all">
                    <i class="fa-solid fa-receipt"></i>
                    <span>Moniteur Caisse</span>
                </button>
            </div>

            <div class="flex items-center gap-x-3">
                <div class="bg-emerald-500/10 text-emerald-400 text-xs font-mono px-3 py-1.5 rounded-2xl border border-emerald-500/30">
                    EN LIGNE
                </div>
            </div>
        </div>
    </nav>

    <!-- VIEW AGENT -->
    <main id="view-agent" class="view active max-w-2xl mx-auto px-6 py-10">
        <div class="card bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
            <div class="flex items-center gap-x-4 mb-8">
                <div class="w-11 h-11 bg-blue-600/10 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-bus text-blue-400 text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-semibold tracking-tight">Enregistrement Bus</h1>
                    <p class="text-slate-400">Scan rapide • Données précises</p>
                </div>
            </div>

            <!-- CAMERA -->
            <div class="relative mb-8 rounded-3xl overflow-hidden border border-slate-700 shadow-inner bg-black">
                <video id="camera-feed" autoplay playsinline class="w-full aspect-video object-cover"></video>
                
                <div class="scan-frame"></div>
                
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2">
                    <button onclick="scanPlate()" id="btn-scan"
                            class="flex items-center gap-x-3 bg-white hover:bg-slate-100 text-slate-900 font-semibold px-8 py-4 rounded-2xl shadow-xl transition-all active:scale-95">
                        <i class="fa-solid fa-bolt"></i>
                        <span>Scanner la plaque</span>
                    </button>
                </div>
                
                <div id="ocr-status" class="absolute top-6 left-1/2 -translate-x-1/2 text-sm font-medium px-6 py-2 bg-black/70 rounded-2xl hidden"></div>
            </div>

            <form id="bus-form" class="space-y-8">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Plaque d'immatriculation</label>
                    <input type="text" id="plaque" 
                           class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-5 text-2xl font-mono tracking-widest text-center uppercase"
                           placeholder="AB-123-CD" required>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Couleur</label>
                        <input type="text" id="couleur" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4"
                               placeholder="Bleu métallisé" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">École / Organisation</label>
                        <input type="text" id="ecole" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4"
                               placeholder="Lycée Victor Hugo" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Code Postal</label>
                        <input type="text" id="cp" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4"
                               placeholder="75016" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Ville</label>
                        <input type="text" id="ville" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4"
                               placeholder="Paris" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Nombre d'enfants</label>
                        <input type="number" id="nb_enfants" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4 text-center text-2xl"
                               value="0" required>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Accompagnateurs</label>
                        <input type="number" id="nb_adultes" 
                               class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4 text-center text-2xl"
                               value="0" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-400 mb-2 font-medium">Responsable</label>
                    <input type="text" id="responsable" 
                           class="input-modern w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-2xl px-6 py-4"
                           placeholder="Mme. Sophie Laurent" required>
                </div>

                <!-- SIGNATURE -->
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-400 mb-3 font-medium">Signature du responsable</label>
                    <div class="signature-container p-4">
                        <canvas id="signature-pad" class="w-full h-48 bg-white rounded-xl cursor-crosshair"></canvas>
                    </div>
                    <button type="button" onclick="clearSignature()" 
                            class="mt-3 text-red-400 hover:text-red-500 text-sm flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-eraser"></i>
                        <span>Effacer la signature</span>
                    </button>
                </div>

                <button type="submit" id="btn-submit"
                        class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 py-6 text-lg font-semibold rounded-3xl shadow-xl shadow-blue-500/40 transition-all active:scale-[0.985] flex items-center justify-center gap-x-3">
                    <i class="fa-solid fa-paper-plane"></i>
                    VALIDER ET ENVOYER EN CAISSE
                </button>
            </form>
        </div>
    </main>

    <!-- VIEW CAISSE -->
    <main id="view-caisse" class="view max-w-7xl mx-auto px-6 py-10 hidden">
        <div class="card bg-slate-900 border border-slate-800 rounded-3xl p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                <div class="flex items-center gap-x-4">
                    <i class="fa-solid fa-list-check text-4xl text-emerald-400"></i>
                    <div>
                        <h1 class="text-3xl font-semibold tracking-tight">Flux d'arrivées</h1>
                        <p class="text-slate-400">Temps réel • ParkBus Manager</p>
                    </div>
                </div>
                
                <div class="relative w-full md:w-96">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <input type="text" id="search-bar" 
                           class="w-full bg-slate-950 border border-slate-700 focus:border-blue-500 rounded-3xl pl-12 py-5 text-lg"
                           placeholder="Rechercher école ou plaque...">
                </div>
            </div>

            <div class="overflow-x-auto rounded-3xl border border-slate-800">
                <table class="w-full" id="buses-table">
                    <thead>
                        <tr class="border-b border-slate-800">
                            <th class="text-left py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Heure</th>
                            <th class="text-left py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Plaque</th>
                            <th class="text-left py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Établissement</th>
                            <th class="text-left py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Provenance</th>
                            <th class="text-center py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Élèves</th>
                            <th class="text-center py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Adultes</th>
                            <th class="text-center py-6 px-8 text-xs font-semibold uppercase tracking-widest text-slate-400">Signature</th>
                        </tr>
                    </thead>
                    <tbody id="buses-list" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        // Tailwind script already included via CDN
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // === CONFIG FIREBASE (à remplacer) ===
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "TON_PROJET.firebaseapp.com",
            projectId: "TON_PROJET",
            storageBucket: "TON_PROJET.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Navigation
        window.switchTab = (tab) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'agent') startCamera();
            else stopCamera();
        };

        // Camera & OCR
        let stream = null;
        const video = document.getElementById('camera-feed');
        const statusText = document.getElementById('ocr-status');

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error(err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        window.scanPlate = async () => {
            statusText.classList.remove('hidden');
            statusText.innerHTML = `<span class="text-amber-400">Analyse OCR en cours...</span>`;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'fra', { logger: m => console.log(m) });
                
                const regex = /[A-Z]{2}[-.\s]?[0-9]{3}[-.\s]?[A-Z]{2}/i;
                const match = text.match(regex);
                
                if (match) {
                    const plaque = match[0].toUpperCase().replace(/[\s.]/g, '-');
                    document.getElementById('plaque').value = plaque;
                    statusText.innerHTML = `<span class="text-emerald-400">✓ Plaque détectée : ${plaque}</span>`;
                } else {
                    statusText.innerHTML = `<span class="text-red-400">Aucune plaque détectée. Veuillez saisir manuellement.</span>`;
                }
            } catch (e) {
                statusText.innerHTML = `<span class="text-red-400">Erreur pendant l'analyse</span>`;
            }
            
            setTimeout(() => statusText.classList.add('hidden'), 4500);
        };

        // Signature
        const canvasSig = document.getElementById('signature-pad');
        const ctx = canvasSig.getContext('2d');
        let isDrawing = false;

        function resizeSignature() {
            const ratio = window.devicePixelRatio || 1;
            canvasSig.width = canvasSig.offsetWidth * ratio;
            canvasSig.height = canvasSig.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#1e2937";
        }

        function startDraw(e) {
            isDrawing = true;
            draw(e);
        }

        function endDraw() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvasSig.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvasSig.addEventListener('mousedown', startDraw);
        canvasSig.addEventListener('mouseup', endDraw);
        canvasSig.addEventListener('mousemove', draw);
        canvasSig.addEventListener('touchstart', startDraw);
        canvasSig.addEventListener('touchend', endDraw);
        canvasSig.addEventListener('touchmove', draw);

        window.clearSignature = () => {
            ctx.clearRect(0, 0, canvasSig.width, canvasSig.height);
        };

        // Resize handlers
        window.addEventListener('resize', () => {
            if (!document.getElementById('view-agent').classList.contains('hidden')) resizeSignature();
        });
        setTimeout(() => {
            resizeSignature();
            startCamera();
        }, 300);

        // Form submission
        document.getElementById('bus-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> ENREGISTREMENT...`;

            try {
                const signatureDataUrl = canvasSig.toDataURL('image/png');
                const signatureRef = ref(storage, `signatures/${Date.now()}.png`);
                await uploadString(signatureRef, signatureDataUrl, 'data_url');
                const signatureUrl = await getDownloadURL(signatureRef);

                await addDoc(collection(db, "buses"), {
                    timestamp: new Date(),
                    plaque: document.getElementById('plaque').value,
                    couleur: document.getElementById('couleur').value,
                    ecole: document.getElementById('ecole').value,
                    cp: document.getElementById('cp').value,
                    ville: document.getElementById('ville').value,
                    nb_enfants: parseInt(document.getElementById('nb_enfants').value) || 0,
                    nb_adultes: parseInt(document.getElementById('nb_adultes').value) || 0,
                    responsable: document.getElementById('responsable').value,
                    signature_url: signatureUrl
                });

                alert("✅ Bus enregistré avec succès !");
                e.target.reset();
                clearSignature();
            } catch (error) {
                console.error(error);
                alert("❌ Une erreur est survenue.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Real-time table
        let allBuses = [];
        
        const q = query(collection(db, "buses"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            allBuses = [];
            snapshot.forEach(doc => allBuses.push(doc.data()));
            renderTable(allBuses);
        });

        function renderTable(data) {
            const tbody = document.getElementById('buses-list');
            tbody.innerHTML = '';
            
            data.forEach(bus => {
                const date = bus.timestamp.toDate ? bus.timestamp.toDate() : new Date(bus.timestamp);
                const time = date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800 hover:bg-slate-800/60";
                tr.innerHTML = `
                    <td class="py-6 px-8 font-mono">${time}</td>
                    <td class="py-6 px-8">
                        <span class="inline-block bg-slate-800 text-blue-300 font-mono px-4 py-2 rounded-2xl">${bus.plaque}</span>
                    </td>
                    <td class="py-6 px-8 font-medium">${bus.ecole}</td>
                    <td class="py-6 px-8 text-slate-400">${bus.ville} <span class="font-mono">(${bus.cp})</span></td>
                    <td class="py-6 px-8 text-center">
                        <span class="inline-flex items-center justify-center bg-emerald-500/10 text-emerald-400 w-9 h-9 rounded-2xl font-semibold">${bus.nb_enfants}</span>
                    </td>
                    <td class="py-6 px-8 text-center">
                        <span class="inline-flex items-center justify-center bg-amber-500/10 text-amber-400 w-9 h-9 rounded-2xl font-semibold">${bus.nb_adultes}</span>
                    </td>
                    <td class="py-6 px-8 text-center">
                        <img src="${bus.signature_url}" class="h-12 mx-auto border border-slate-700 rounded-xl" alt="signature">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search
        document.getElementById('search-bar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = allBuses.filter(bus => 
                bus.ecole.toLowerCase().includes(term) || 
                bus.plaque.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });
    </script>
</body>
</html>
