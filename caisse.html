<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caisse - Gestion des Groupes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Retour
            </a>
            <h1>Caisse</h1>
            <div></div>
        </header>

        <!-- Liste des groupes en attente -->
        <section class="form-container" id="pendingSection">
            <h2 class="mb-2">Groupes en attente</h2>
            <div id="groupsList" class="groups-list">
                <div class="spinner"></div>
            </div>
        </section>

        <!-- Liste des groupes validés -->
        <section class="form-container" id="validatedSection">
            <h2 class="mb-2">Groupes validés</h2>
            <div id="validatedList" class="groups-list">
                <p class="text-center" style="color: var(--gray-500); padding: 2rem;">Aucun groupe validé aujourd'hui</p>
            </div>
        </section>

        <!-- Détails du groupe sélectionné -->
        <section id="groupDetails" class="form-container hidden">
            <div class="group-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 id="selectedGroupId" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></h2>
                    <p id="selectedGroupInfo" style="color: var(--text-muted);"></p>
                </div>
                <div class="group-qr" id="selectedQRCode"></div>
            </div>

            <div class="validation-row">
                <span>École:</span>
                <strong id="detailSchool"></strong>
            </div>
            <div class="validation-row">
                <span>Ville:</span>
                <strong id="detailCity"></strong>
            </div>
            <div class="validation-row">
                <span>Responsable:</span>
                <strong id="detailLeader"></strong>
            </div>
            <div class="validation-row">
                <span>Enfants:</span>
                <strong id="detailChildren"></strong>
            </div>
            <div class="validation-row">
                <span>Accompagnateurs:</span>
                <strong id="detailAdults"></strong>
            </div>
            <div class="validation-row">
                <span>Total:</span>
                <strong id="detailTotal"></strong>
            </div>
            <div class="validation-row">
                <span>Arrivée:</span>
                <strong id="detailArrival"></strong>
            </div>
            <div class="validation-row" id="signatureRow" style="display: none;">
                <span>Signature du responsable:</span>
                <div id="detailSignature" style="background: white; border-radius: 8px; padding: 0.5rem; display: inline-block;"></div>
            </div>
            <div class="validation-row" id="statusRow" style="display: none;">
                <span>Statut:</span>
                <strong id="detailStatus" style="color: var(--success);">Payé ✓</strong>
            </div>
        </section>

        <!-- Activités -->
        <section id="activitiesSection" class="form-container hidden">
            <h2 class="mb-2">Activités payantes</h2>
            <p id="activitiesHint" style="color: var(--text-muted); margin-bottom: 1rem;">
                Sélectionnez les quantités ou cochez "Groupe complet"
            </p>

            <div class="activities-grid" id="activitiesGrid">
                <!-- Dynamically populated -->
            </div>

        </section>

        <!-- Boutons d'action (hors du cadre des activités) -->
        <section id="actionButtonsSection" class="hidden">
            <div class="btn-group" id="actionButtons">
                <button class="btn btn-outline" id="deselectGroup">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 0.5rem;">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Retour à la liste
                </button>
                <button class="btn btn-success" id="validatePayment">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 0.5rem;">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Valider et générer le PDF
                </button>
            </div>
        </section>

        <!-- Boutons pour groupes payés (hors du cadre) -->
        <section id="paidButtonsSection" class="hidden">
            <button class="btn btn-primary btn-block" id="downloadPDF">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 0.5rem;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Télécharger le PDF
            </button>
            <button class="btn btn-outline btn-block" id="backToList" style="margin-top: 0.5rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align: middle; margin-right: 0.5rem;">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Retour à la liste
            </button>
        </section>
    </div>

    <!-- Hidden container for PDF generation -->
    <div id="pdfContainer" style="position: fixed; left: -9999px; top: 0;">
        <div id="pdfQRCode"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const caisse = {
            selectedGroup: null,
            activities: [
                { id: 'karting', name: 'Karting', price: 8 },
                { id: 'laser_game', name: 'Laser Game', price: 10 },
                { id: 'escape_game', name: 'Escape Game', price: 12 },
                { id: 'vr_experience', name: 'VR Expérience', price: 6 },
                { id: 'tyrolienne', name: 'Tyrolienne', price: 7 },
                { id: 'climbing', name: 'Escalade', price: 5 }
            ],

            init() {
                this.setupActivities();
                this.setupEventListeners();
                this.loadGroups();
                
                // Real-time updates
                app.listenToGroups((groups) => {
                    this.renderGroups(groups);
                });
            },

            setupActivities() {
                const grid = document.getElementById('activitiesGrid');
                grid.innerHTML = '';

                this.activities.forEach(activity => {
                    const card = document.createElement('div');
                    card.className = 'activity-card';
                    card.innerHTML = `
                        <div class="activity-header">
                            <span class="activity-title">${activity.name}</span>
                            <span style="color: var(--gray-500);">${activity.price}€</span>
                        </div>
                        <div class="activity-controls">
                            <input type="number" 
                                   class="form-group activity-input" 
                                   id="activity_${activity.id}" 
                                   min="0" 
                                   value="0"
                                   data-activity="${activity.id}"
                                   placeholder="Places">
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="group_${activity.id}" data-activity="${activity.id}">
                            <label for="group_${activity.id}">Groupe enfants complet</label>
                        </div>
                    `;
                    grid.appendChild(card);
                    
                    // Attach checkbox listener for this activity
                    const checkbox = document.getElementById(`group_${activity.id}`);
                    checkbox.addEventListener('change', (e) => {
                        const activityId = e.target.dataset.activity;
                        const input = document.getElementById(`activity_${activityId}`);
                        
                        if (e.target.checked && this.selectedGroup) {
                            // Use only children count for "Groupe enfants complet"
                            input.value = this.selectedGroup.childrenCount;
                            input.disabled = true;
                        } else {
                            input.value = 0;
                            input.disabled = false;
                        }
                    });
                });
            },

            setupEventListeners() {
                document.getElementById('deselectGroup').addEventListener('click', () => {
                    this.deselectGroup();
                });

                document.getElementById('validatePayment').addEventListener('click', () => {
                    this.validatePayment();
                });
            },

            loadGroups() {
                // Initial load - realtime updates handle the rest
            },

            renderGroups(groups) {
                const pendingContainer = document.getElementById('groupsList');
                const validatedContainer = document.getElementById('validatedList');
                
                // Separate pending and validated groups
                const pendingGroups = groups.filter(g => g.status !== 'paid');
                const validatedGroups = groups.filter(g => g.status === 'paid');
                
                // Render pending groups
                if (pendingGroups.length === 0) {
                    pendingContainer.innerHTML = '<p class="text-center" style="color: var(--gray-500); padding: 2rem;">Aucun groupe en attente</p>';
                } else {
                    // Sort by arrival time (oldest first)
                    pendingGroups.sort((a, b) => new Date(a.arrivalTime) - new Date(b.arrivalTime));
                    pendingContainer.innerHTML = '';
                    
                    pendingGroups.forEach(group => {
                        const card = this.createGroupCard(group, false);
                        pendingContainer.appendChild(card);
                    });
                }
                
                // Render validated groups
                if (validatedGroups.length === 0) {
                    validatedContainer.innerHTML = '<p class="text-center" style="color: var(--gray-500); padding: 2rem;">Aucun groupe validé aujourd\'hui</p>';
                } else {
                    // Sort by payment time (most recent first)
                    validatedGroups.sort((a, b) => new Date(b.paymentTime || b.arrivalTime) - new Date(a.paymentTime || a.arrivalTime));
                    validatedContainer.innerHTML = '';
                    
                    validatedGroups.forEach(group => {
                        const card = this.createGroupCard(group, true);
                        validatedContainer.appendChild(card);
                    });
                }
            },

            createGroupCard(group, isValidated) {
                const card = document.createElement('div');
                card.className = 'group-card';
                if (this.selectedGroup && this.selectedGroup.id === group.id) {
                    card.classList.add('selected');
                }
                if (isValidated) {
                    card.style.opacity = '0.7';
                }
                
                const arrivalTime = new Date(group.arrivalTime).toLocaleTimeString('fr-FR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                card.innerHTML = `
                    <div class="group-qr">
                        <canvas id="qr_${group.id}"></canvas>
                    </div>
                    <div class="group-details">
                        <h3>${group.schoolName}</h3>
                        <p>${group.city} (${group.postalCode})</p>
                        <p style="margin-top: 0.5rem; color: var(--gray-500);">${group.leaderFirstName} ${group.leaderLastName}</p>
                    </div>
                    <div class="group-meta">
                        <div class="group-time">${arrivalTime}</div>
                        <div class="group-counts">
                            <span class="count-badge">${group.childrenCount} enfants</span>
                            <span class="count-badge">${group.adultsCount} adultes</span>
                        </div>
                        ${isValidated ? '<span style="color: #22c55e; font-size: 0.75rem;">Payé</span>' : ''}
                    </div>
                `;

                card.addEventListener('click', () => this.selectGroup(group));

                // Generate mini QR code
                setTimeout(() => {
                    const qrCanvas = document.getElementById(`qr_${group.id}`);
                    if (qrCanvas) {
                        new QRCode(qrCanvas, {
                            text: group.id,
                            width: 64,
                            height: 64,
                            colorDark: '#000000',
                            colorLight: '#ffffff',
                            correctLevel: QRCode.CorrectLevel.M
                        });
                    }
                }, 0);
                
                return card;
            },

            selectGroup(group) {
                this.selectedGroup = group;
                const isPaid = group.status === 'paid';
                
                // Hide pending and validated sections
                document.getElementById('pendingSection').classList.add('hidden');
                document.getElementById('validatedSection').classList.add('hidden');
                
                // Show group details and activities
                document.getElementById('groupDetails').classList.remove('hidden');
                document.getElementById('activitiesSection').classList.remove('hidden');
                document.getElementById('actionButtonsSection').classList.remove('hidden');

                // Fill details
                document.getElementById('selectedGroupId').textContent = group.id;
                document.getElementById('selectedGroupInfo').textContent = 
                    `Plaque: ${group.plateNumber || 'Non spécifiée'}`;
                document.getElementById('detailSchool').textContent = group.schoolName;
                document.getElementById('detailCity').textContent = `${group.city} (${group.postalCode})`;
                document.getElementById('detailLeader').textContent = 
                    `${group.leaderFirstName} ${group.leaderLastName}`;
                document.getElementById('detailChildren').textContent = group.childrenCount;
                document.getElementById('detailAdults').textContent = group.adultsCount;
                document.getElementById('detailTotal').textContent = 
                    group.childrenCount + group.adultsCount;
                document.getElementById('detailArrival').textContent = 
                    new Date(group.arrivalTime).toLocaleString('fr-FR');

                // Show signature if exists
                const signatureRow = document.getElementById('signatureRow');
                const detailSignature = document.getElementById('detailSignature');
                if (group.signature) {
                    signatureRow.style.display = 'flex';
                    detailSignature.innerHTML = `<img src="${group.signature}" style="max-height: 60px; max-width: 200px;" />`;
                } else {
                    signatureRow.style.display = 'none';
                }

                // Show status if paid
                const statusRow = document.getElementById('statusRow');
                statusRow.style.display = isPaid ? 'flex' : 'none';

                // Generate QR code
                const qrContainer = document.getElementById('selectedQRCode');
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: group.id,
                    width: 80,
                    height: 80,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Setup activities section based on payment status
                this.setupActivitiesForGroup(group, isPaid);

                // Re-render list to show selection
                this.renderGroups(app.groups || []);
                
                window.scrollTo(0, document.getElementById('groupDetails').offsetTop - 20);
            },

            setupActivitiesForGroup(group, isPaid) {
                const activitiesHint = document.getElementById('activitiesHint');
                const actionButtons = document.getElementById('actionButtons');
                
                if (isPaid) {
                    // Group already paid - show read-only view
                    activitiesHint.innerHTML = '<span style="color: #22c55e;">Ce groupe est déjà payé et validé. Les informations ne peuvent plus être modifiées.</span>';
                    activitiesHint.style.color = 'var(--success)';
                    
                    // Hide regular action buttons section
                    document.getElementById('actionButtonsSection').classList.add('hidden');
                    
                    // Show paid buttons section
                    document.getElementById('paidButtonsSection').classList.remove('hidden');
                    
                    // Setup paid buttons handlers
                    document.getElementById('downloadPDF').onclick = () => this.generatePDF(group, group.activities || {});
                    document.getElementById('backToList').onclick = () => this.deselectGroup();
                    
                    // Show saved activities as read-only
                    const grid = document.getElementById('activitiesGrid');
                    grid.innerHTML = '';
                    
                    if (group.activities && Object.keys(group.activities).length > 0) {
                        Object.values(group.activities).forEach(activity => {
                            const card = document.createElement('div');
                            card.className = 'activity-card';
                            card.innerHTML = `
                                <div class="activity-header">
                                    <span class="activity-title">${activity.name}</span>
                                    <span style="color: var(--success);">${activity.quantity} places</span>
                                </div>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Prix unitaire: ${activity.price}€</p>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Total: ${activity.quantity * activity.price}€</p>
                            `;
                            card.style.opacity = '0.8';
                            grid.appendChild(card);
                        });
                    } else {
                        grid.innerHTML = '<p style="color: var(--text-muted);">Aucune activité payante sélectionnée</p>';
                    }
                    
                } else {
                    // Group not paid - allow editing
                    activitiesHint.textContent = 'Sélectionnez les quantités ou cochez "Groupe enfants complet"';
                    activitiesHint.style.color = 'var(--text-muted)';
                    
                    // Show action buttons section
                    document.getElementById('actionButtonsSection').classList.remove('hidden');
                    document.getElementById('paidButtonsSection').classList.add('hidden');
                    
                    // Reset and enable activity inputs
                    this.setupActivities();
                }
            },

            deselectGroup() {
                this.selectedGroup = null;
                document.getElementById('groupDetails').classList.add('hidden');
                document.getElementById('activitiesSection').classList.add('hidden');
                document.getElementById('actionButtonsSection').classList.add('hidden');
                document.getElementById('paidButtonsSection').classList.add('hidden');
                
                // Show pending and validated sections again
                document.getElementById('pendingSection').classList.remove('hidden');
                document.getElementById('validatedSection').classList.remove('hidden');
                
                this.renderGroups(app.groups || []);
                window.scrollTo(0, 0);
            },

            async validatePayment() {
                if (!this.selectedGroup) return;

                // Collect activities
                const activities = {};
                this.activities.forEach(activity => {
                    const quantity = parseInt(document.getElementById(`activity_${activity.id}`).value) || 0;
                    if (quantity > 0) {
                        activities[activity.id] = {
                            name: activity.name,
                            quantity: quantity,
                            price: activity.price,
                            completed: 0
                        };
                    }
                });

                // Confirm before validation
                const totalActivities = Object.values(activities).reduce((sum, act) => sum + act.quantity, 0);
                const confirmMsg = totalActivities > 0 
                    ? `Confirmer le paiement pour ${totalActivities} places d'activités ?\n\nUne fois validé, vous ne pourrez plus modifier ces informations.`
                    : `Confirmer le paiement sans activités ?\n\nUne fois validé, vous ne pourrez plus modifier ces informations.`;
                
                if (!confirm(confirmMsg)) {
                    return;
                }

                try {
                    await app.updateGroup(this.selectedGroup.id, {
                        activities: activities,
                        status: 'paid',
                        paymentTime: new Date().toISOString()
                    });

                    // Generate and download PDF
                    await this.generatePDF(this.selectedGroup, activities);

                    app.showToast('Paiement validé et PDF téléchargé', 'success');
                    
                    // Auto-return to group list after a short delay
                    setTimeout(() => {
                        this.deselectGroup();
                    }, 1500);
                    
                } catch (err) {
                    app.showToast('Erreur: ' + err.message, 'error');
                }
            },

            async generatePDF(group, activities) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // ==================== CONFIGURATION ====================
                const pageWidth = 210;
                const margin = 20;
                const contentWidth = pageWidth - (margin * 2);
                let y = 15;
                
                // Couleurs
                const colors = {
                    black: [0, 0, 0],
                    grayDark: [60, 60, 60],
                    grayMedium: [100, 100, 100],
                    grayLight: [150, 150, 150],
                    grayBg: [245, 245, 245],
                    line: [200, 200, 200]
                };
                
                // ==================== HEADER AVEC LOGO ====================
                // Option 1: URL relative (fonctionne quand l'app est en HTTPS)
                const loadImage = (url) => {
                    return new Promise((resolve, reject) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            resolve({
                                dataUrl: canvas.toDataURL('image/png'),
                                width: img.width,
                                height: img.height
                            });
                        };
                        img.onerror = reject;
                        img.src = url;
                    });
                };

                try {
                    const logoUrl = 'assets/logo-herouval.png'; // URL relative
                    const logoData = await loadImage(logoUrl);
                    const logoMaxWidth = 50; // Largeur max souhaitée
                    // Calculer la hauteur en préservant le ratio
                    const ratio = logoData.height / logoData.width;
                    const logoWidth = logoMaxWidth;
                    const logoHeight = logoMaxWidth * ratio;
                    doc.addImage(logoData.dataUrl, 'PNG', (pageWidth - logoWidth) / 2, y, logoWidth, logoHeight);
                    y += logoHeight + 8;
                } catch (err) {
                    // Fallback: texte si logo non disponible
                    doc.setFontSize(20);
                    doc.setFont(undefined, 'bold');
                    doc.setTextColor(...colors.black);
                    doc.text('HÉROUVAL', pageWidth / 2, y + 10, { align: 'center' });
                    y += 18;
                }
                
                // Sous-titre
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(...colors.grayMedium);
                doc.text('Ticket Groupe Scolaire', pageWidth / 2, y, { align: 'center' });
                y += 10;
                
                // Ligne de séparation
                doc.setDrawColor(...colors.line);
                doc.line(margin, y, pageWidth - margin, y);
                y += 12;
                
                // ==================== SECTION: IDENTIFICATION ====================
                doc.setFontSize(20);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(...colors.black);
                doc.text(group.id, pageWidth / 2, y, { align: 'center' });
                y += 7;
                
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(...colors.grayMedium);
                doc.text(`Plaque: ${group.plateNumber || 'Non spécifiée'}`, pageWidth / 2, y, { align: 'center' });
                y += 12;
                
                // ==================== SECTION: INFORMATIONS GROUPE ====================
                // École
                doc.setFontSize(11);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(...colors.black);
                doc.text(group.schoolName.toUpperCase(), margin, y);
                y += 5;
                
                // Ville
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(...colors.grayMedium);
                doc.text(`${group.city} (${group.postalCode})`, margin, y);
                y += 8;
                
                // Box composition (enfants + adultes)
                doc.setFillColor(...colors.grayBg);
                doc.roundedRect(margin, y - 2, contentWidth, 14, 2, 2, 'F');
                
                doc.setFontSize(9);
                doc.setTextColor(...colors.grayDark);
                const totalPeople = group.childrenCount + group.adultsCount;
                doc.text(`${group.childrenCount} enfants + ${group.adultsCount} accompagnateurs = ${totalPeople} personnes`, margin + 5, y + 6);
                y += 18;
                
                // Responsable
                doc.setFontSize(8);
                doc.setTextColor(...colors.grayMedium);
                doc.text('Responsable:', margin, y);
                y += 4;
                doc.setFontSize(10);
                doc.setTextColor(...colors.black);
                doc.text(`${group.leaderFirstName} ${group.leaderLastName}`, margin, y);
                y += 8;
                
                // Date d'arrivée
                doc.setFontSize(8);
                doc.setTextColor(...colors.grayLight);
                const arrivalDate = new Date(group.arrivalTime).toLocaleString('fr-FR');
                doc.text(`Arrivée: ${arrivalDate}`, margin, y);
                y += 10;
                
                // ==================== SECTION: ACTIVITÉS ====================
                doc.setDrawColor(...colors.line);
                doc.line(margin, y, pageWidth - margin, y);
                y += 6;
                
                const activityCount = Object.keys(activities).length;
                if (activityCount > 0) {
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'bold');
                    doc.setTextColor(...colors.black);
                    doc.text('ACTIVITÉS RÉSERVÉES', margin, y);
                    y += 5;
                    
                    doc.setFontSize(9);
                    doc.setFont(undefined, 'normal');
                    doc.setTextColor(...colors.grayDark);
                    
                    Object.values(activities).forEach(act => {
                        const placesText = act.quantity > 1 ? 'places' : 'place';
                        doc.text(`• ${act.name}: ${act.quantity} ${placesText}`, margin + 3, y);
                        y += 4;
                    });
                    y += 4;
                } else {
                    doc.setFontSize(9);
                    doc.setTextColor(...colors.grayLight);
                    doc.text('Aucune activité payante', margin, y);
                    y += 6;
                }
                
                // ==================== SECTION: QR CODE ====================
                doc.setDrawColor(...colors.line);
                doc.line(margin, y, pageWidth - margin, y);
                y += 6;
                
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(...colors.black);
                doc.text('QR CODE', pageWidth / 2, y, { align: 'center' });
                y += 3;
                
                doc.setFontSize(8);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(...colors.grayMedium);
                doc.text('Présentez ce code aux attractions', pageWidth / 2, y + 2, { align: 'center' });
                y += 10;
                
                // ==================== QR CODE GÉNÉRATION ====================
                const qrContainer = document.createElement('div');
                qrContainer.style.position = 'fixed';
                qrContainer.style.left = '-9999px';
                qrContainer.style.top = '0';
                document.body.appendChild(qrContainer);
                
                let qrDataUrl = null;
                await new Promise(resolve => {
                    const qrCode = new QRCode(qrContainer, {
                        text: group.id,
                        width: 100,
                        height: 100,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    
                    const checkQR = () => {
                        const canvas = qrContainer.querySelector('canvas');
                        if (canvas && canvas.width > 0) {
                            qrDataUrl = canvas.toDataURL('image/png');
                            resolve();
                        } else {
                            setTimeout(checkQR, 50);
                        }
                    };
                    setTimeout(checkQR, 100);
                });
                
                document.body.removeChild(qrContainer);
                
                // Ajout QR au PDF
                const qrSize = 40;
                if (qrDataUrl) {
                    doc.addImage(qrDataUrl, 'PNG', (pageWidth - qrSize) / 2, y, qrSize, qrSize);
                }
                y += qrSize + 4;
                
                doc.setFontSize(7);
                doc.setTextColor(...colors.grayLight);
                doc.text(group.id, pageWidth / 2, y, { align: 'center' });
                y += 8;
                
                // ==================== SIGNATURE (si présente) ====================
                if (group.signature) {
                    doc.setDrawColor(...colors.line);
                    doc.line(margin, y, pageWidth - margin, y);
                    y += 6;
                    
                    const colWidth = (contentWidth - 10) / 2;
                    
                    // Label signature
                    doc.setFontSize(8);
                    doc.setFont(undefined, 'bold');
                    doc.setTextColor(...colors.black);
                    doc.text('SIGNATURE DU RESPONSABLE', margin + colWidth + 10, y + 4);
                    
                    // Box signature
                    doc.setFillColor(250, 250, 250);
                    doc.roundedRect(margin + colWidth + 10, y + 6, colWidth, 22, 2, 2, 'F');
                    doc.setDrawColor(...colors.line);
                    doc.roundedRect(margin + colWidth + 10, y + 6, colWidth, 22, 2, 2, 'D');
                    
                    try {
                        doc.addImage(group.signature, 'PNG', margin + colWidth + 12, y + 8, colWidth - 4, 18);
                    } catch (err) {
                        console.error('Error adding signature:', err);
                    }
                    
                    y += 32;
                }
                
                // ==================== FOOTER ====================
                const now = new Date();
                doc.setFontSize(7);
                doc.setTextColor(...colors.grayLight);
                doc.text(`Document généré le ${now.toLocaleString('fr-FR')} - Hérouval`, pageWidth / 2, 285, { align: 'center' });
                
                // Téléchargement
                const filename = `${group.id.replace('#', '')}_Hérouval.pdf`;
                doc.save(filename);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            caisse.init();
        });
    </script>
</body>
</html>
