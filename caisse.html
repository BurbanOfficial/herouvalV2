<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caisse - Gestion des Groupes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="index.html" class="back-link">← Retour</a>
            <h1>💰 Caisse</h1>
            <div></div>
        </header>

        <!-- Liste des groupes -->
        <section class="form-container">
            <h2 class="mb-2">Groupes en attente</h2>
            <div id="groupsList" class="groups-list">
                <div class="spinner"></div>
            </div>
        </section>

        <!-- Détails du groupe sélectionné -->
        <section id="groupDetails" class="form-container hidden">
            <div class="group-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 id="selectedGroupId" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></h2>
                    <p id="selectedGroupInfo" style="color: var(--text-muted);"></p>
                </div>
                <div class="group-qr" id="selectedQRCode"></div>
            </div>

            <div class="validation-row">
                <span>École:</span>
                <strong id="detailSchool"></strong>
            </div>
            <div class="validation-row">
                <span>Ville:</span>
                <strong id="detailCity"></strong>
            </div>
            <div class="validation-row">
                <span>Responsable:</span>
                <strong id="detailLeader"></strong>
            </div>
            <div class="validation-row">
                <span>Enfants:</span>
                <strong id="detailChildren"></strong>
            </div>
            <div class="validation-row">
                <span>Accompagnateurs:</span>
                <strong id="detailAdults"></strong>
            </div>
            <div class="validation-row">
                <span>Total:</span>
                <strong id="detailTotal"></strong>
            </div>
            <div class="validation-row">
                <span>Arrivée:</span>
                <strong id="detailArrival"></strong>
            </div>
            <div class="validation-row" id="signatureRow" style="display: none;">
                <span>Signature du responsable:</span>
                <div id="detailSignature" style="background: white; border-radius: 8px; padding: 0.5rem; display: inline-block;"></div>
            </div>
            <div class="validation-row" id="statusRow" style="display: none;">
                <span>Statut:</span>
                <strong id="detailStatus" style="color: var(--success);">Payé ✓</strong>
            </div>
        </section>

        <!-- Activités -->
        <section id="activitiesSection" class="form-container hidden">
            <h2 class="mb-2">Activités payantes</h2>
            <p id="activitiesHint" style="color: var(--text-muted); margin-bottom: 1rem;">
                Sélectionnez les quantités ou cochez "Groupe complet"
            </p>

            <div class="activities-grid" id="activitiesGrid">
                <!-- Dynamically populated -->
            </div>

            <div class="btn-group" id="actionButtons">
                <button class="btn btn-outline" id="deselectGroup">Annuler</button>
                <button class="btn btn-success" id="validatePayment">
                    ✓ Valider et générer le PDF
                </button>
            </div>
        </section>
    </div>

    <!-- Hidden container for PDF generation -->
    <div id="pdfContainer" style="position: fixed; left: -9999px; top: 0;">
        <div id="pdfQRCode"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const caisse = {
            selectedGroup: null,
            activities: [
                { id: 'karting', name: 'Karting', price: 8 },
                { id: 'laser_game', name: 'Laser Game', price: 10 },
                { id: 'escape_game', name: 'Escape Game', price: 12 },
                { id: 'vr_experience', name: 'VR Expérience', price: 6 },
                { id: 'tyrolienne', name: 'Tyrolienne', price: 7 },
                { id: 'climbing', name: 'Escalade', price: 5 }
            ],

            init() {
                this.setupActivities();
                this.setupEventListeners();
                this.loadGroups();
                
                // Real-time updates
                app.listenToGroups((groups) => {
                    this.renderGroups(groups);
                });
            },

            setupActivities() {
                const grid = document.getElementById('activitiesGrid');
                grid.innerHTML = '';

                this.activities.forEach(activity => {
                    const card = document.createElement('div');
                    card.className = 'activity-card';
                    card.innerHTML = `
                        <div class="activity-header">
                            <span class="activity-title">${activity.name}</span>
                            <span style="color: var(--text-muted);">${activity.price}€</span>
                        </div>
                        <div class="activity-controls">
                            <input type="number" 
                                   class="form-group activity-input" 
                                   id="activity_${activity.id}" 
                                   min="0" 
                                   value="0"
                                   data-activity="${activity.id}"
                                   placeholder="Places">
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="group_${activity.id}" data-activity="${activity.id}">
                            <label for="group_${activity.id}">Groupe complet</label>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            setupEventListeners() {
                document.getElementById('deselectGroup').addEventListener('click', () => {
                    this.deselectGroup();
                });

                document.getElementById('validatePayment').addEventListener('click', () => {
                    this.validatePayment();
                });

                // Checkbox handlers - when checked, set value to total group
                document.querySelectorAll('[id^="group_"]').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        const activityId = e.target.dataset.activity;
                        const input = document.getElementById(`activity_${activityId}`);
                        
                        if (e.target.checked && this.selectedGroup) {
                            const total = this.selectedGroup.childrenCount + this.selectedGroup.adultsCount;
                            input.value = total;
                            input.disabled = true;
                        } else {
                            input.value = 0;
                            input.disabled = false;
                        }
                    });
                });
            },

            loadGroups() {
                // Initial load - realtime updates handle the rest
            },

            renderGroups(groups) {
                const container = document.getElementById('groupsList');
                
                if (groups.length === 0) {
                    container.innerHTML = '<p class="text-center" style="color: var(--text-muted);">Aucun groupe en attente</p>';
                    return;
                }

                // Sort by arrival time (oldest first)
                groups.sort((a, b) => new Date(a.arrivalTime) - new Date(b.arrivalTime));

                container.innerHTML = '';
                
                groups.forEach(group => {
                    const card = document.createElement('div');
                    card.className = 'group-card';
                    if (this.selectedGroup && this.selectedGroup.id === group.id) {
                        card.classList.add('selected');
                    }
                    
                    const total = group.childrenCount + group.adultsCount;
                    const arrivalTime = new Date(group.arrivalTime).toLocaleTimeString('fr-FR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    card.innerHTML = `
                        <div class="group-qr">
                            <canvas id="qr_${group.id}"></canvas>
                        </div>
                        <div class="group-details">
                            <h3>${group.schoolName}</h3>
                            <p>${group.city} (${group.postalCode})</p>
                            <p style="margin-top: 0.5rem;">Responsable: ${group.leaderFirstName} ${group.leaderLastName}</p>
                        </div>
                        <div class="group-meta">
                            <div class="group-time">${arrivalTime}</div>
                            <div class="group-counts">
                                <span class="count-badge">${group.childrenCount} enfants</span>
                                <span class="count-badge">${group.adultsCount} adultes</span>
                            </div>
                        </div>
                    `;

                    card.addEventListener('click', () => this.selectGroup(group));
                    container.appendChild(card);

                    // Generate mini QR code
                    setTimeout(() => {
                        const qrCanvas = document.getElementById(`qr_${group.id}`);
                        if (qrCanvas) {
                            new QRCode(qrCanvas, {
                                text: group.id,
                                width: 80,
                                height: 80,
                                colorDark: '#1a1a2e',
                                colorLight: '#ffffff',
                                correctLevel: QRCode.CorrectLevel.M
                            });
                        }
                    }, 0);
                });
            },

            selectGroup(group) {
                this.selectedGroup = group;
                const isPaid = group.status === 'paid';
                
                // Update UI
                document.getElementById('groupDetails').classList.remove('hidden');
                document.getElementById('activitiesSection').classList.remove('hidden');

                // Fill details
                document.getElementById('selectedGroupId').textContent = group.id;
                document.getElementById('selectedGroupInfo').textContent = 
                    `Plaque: ${group.plateNumber || 'Non spécifiée'}`;
                document.getElementById('detailSchool').textContent = group.schoolName;
                document.getElementById('detailCity').textContent = `${group.city} (${group.postalCode})`;
                document.getElementById('detailLeader').textContent = 
                    `${group.leaderFirstName} ${group.leaderLastName}`;
                document.getElementById('detailChildren').textContent = group.childrenCount;
                document.getElementById('detailAdults').textContent = group.adultsCount;
                document.getElementById('detailTotal').textContent = 
                    group.childrenCount + group.adultsCount;
                document.getElementById('detailArrival').textContent = 
                    new Date(group.arrivalTime).toLocaleString('fr-FR');

                // Show signature if exists
                const signatureRow = document.getElementById('signatureRow');
                const detailSignature = document.getElementById('detailSignature');
                if (group.signature) {
                    signatureRow.style.display = 'flex';
                    detailSignature.innerHTML = `<img src="${group.signature}" style="max-height: 60px; max-width: 200px;" />`;
                } else {
                    signatureRow.style.display = 'none';
                }

                // Show status if paid
                const statusRow = document.getElementById('statusRow');
                statusRow.style.display = isPaid ? 'flex' : 'none';

                // Generate QR code
                const qrContainer = document.getElementById('selectedQRCode');
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: group.id,
                    width: 80,
                    height: 80,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Setup activities section based on payment status
                this.setupActivitiesForGroup(group, isPaid);

                // Re-render list to show selection
                this.renderGroups(app.groups || []);
                
                window.scrollTo(0, document.getElementById('groupDetails').offsetTop - 20);
            },

            setupActivitiesForGroup(group, isPaid) {
                const activitiesHint = document.getElementById('activitiesHint');
                const actionButtons = document.getElementById('actionButtons');
                
                if (isPaid) {
                    // Group already paid - show read-only view
                    activitiesHint.innerHTML = '<span style="color: var(--success);">✓ Ce groupe est déjà payé et validé. Les informations ne peuvent plus être modifiées.</span>';
                    activitiesHint.style.color = 'var(--success)';
                    
                    // Disable action buttons
                    actionButtons.style.display = 'none';
                    
                    // Show saved activities as read-only
                    const grid = document.getElementById('activitiesGrid');
                    grid.innerHTML = '';
                    
                    if (group.activities && Object.keys(group.activities).length > 0) {
                        Object.values(group.activities).forEach(activity => {
                            const card = document.createElement('div');
                            card.className = 'activity-card';
                            card.innerHTML = `
                                <div class="activity-header">
                                    <span class="activity-title">${activity.name}</span>
                                    <span style="color: var(--success);">${activity.quantity} places</span>
                                </div>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Prix unitaire: ${activity.price}€</p>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Total: ${activity.quantity * activity.price}€</p>
                            `;
                            card.style.opacity = '0.8';
                            grid.appendChild(card);
                        });
                    } else {
                        grid.innerHTML = '<p style="color: var(--text-muted);">Aucune activité payante sélectionnée</p>';
                    }
                    
                    // Add re-download button
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'btn btn-primary btn-block';
                    downloadBtn.style.marginTop = '1rem';
                    downloadBtn.innerHTML = '📄 Télécharger le PDF';
                    downloadBtn.onclick = () => this.generatePDF(group, group.activities || {});
                    grid.appendChild(downloadBtn);
                    
                    // Add back button
                    const backBtn = document.createElement('button');
                    backBtn.className = 'btn btn-outline btn-block';
                    backBtn.style.marginTop = '0.5rem';
                    backBtn.innerHTML = '← Retour à la liste';
                    backBtn.onclick = () => this.deselectGroup();
                    grid.appendChild(backBtn);
                    
                } else {
                    // Group not paid - allow editing
                    activitiesHint.textContent = 'Sélectionnez les quantités ou cochez "Groupe complet"';
                    activitiesHint.style.color = 'var(--text-muted)';
                    
                    // Show action buttons
                    actionButtons.style.display = 'flex';
                    
                    // Reset and enable activity inputs
                    this.setupActivities();
                }
            },

            deselectGroup() {
                this.selectedGroup = null;
                document.getElementById('groupDetails').classList.add('hidden');
                document.getElementById('activitiesSection').classList.add('hidden');
                this.renderGroups(app.groups || []);
            },

            async validatePayment() {
                if (!this.selectedGroup) return;

                // Collect activities
                const activities = {};
                this.activities.forEach(activity => {
                    const quantity = parseInt(document.getElementById(`activity_${activity.id}`).value) || 0;
                    if (quantity > 0) {
                        activities[activity.id] = {
                            name: activity.name,
                            quantity: quantity,
                            price: activity.price,
                            completed: 0
                        };
                    }
                });

                // Confirm before validation
                const totalActivities = Object.values(activities).reduce((sum, act) => sum + act.quantity, 0);
                const confirmMsg = totalActivities > 0 
                    ? `Confirmer le paiement pour ${totalActivities} places d'activités ?\n\nUne fois validé, vous ne pourrez plus modifier ces informations.`
                    : `Confirmer le paiement sans activités ?\n\nUne fois validé, vous ne pourrez plus modifier ces informations.`;
                
                if (!confirm(confirmMsg)) {
                    return;
                }

                try {
                    await app.updateGroup(this.selectedGroup.id, {
                        activities: activities,
                        status: 'paid',
                        paymentTime: new Date().toISOString()
                    });

                    // Generate and download PDF
                    await this.generatePDF(this.selectedGroup, activities);

                    app.showToast('✓ Paiement validé et PDF téléchargé', 'success');
                    this.deselectGroup();
                } catch (err) {
                    app.showToast('❌ Erreur: ' + err.message, 'error');
                }
            },

            async generatePDF(group, activities) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Header with branding
                doc.setFillColor(26, 26, 46); // #1a1a2e
                doc.rect(0, 0, 210, 30, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(22);
                doc.text('Hérouval Control', 105, 15, { align: 'center' });
                doc.setFontSize(12);
                doc.text('Ticket Groupe Scolaire', 105, 25, { align: 'center' });
                
                // Reset text color
                doc.setTextColor(0, 0, 0);
                
                let y = 45;
                
                // Group identification box
                doc.setFillColor(240, 240, 240);
                doc.roundedRect(10, y - 5, 190, 25, 3, 3, 'F');
                doc.setFontSize(16);
                doc.setFont(undefined, 'bold');
                doc.text(`Groupe: ${group.id}`, 15, y + 10);
                doc.setFont(undefined, 'normal');
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text(`Plaque: ${group.plateNumber || 'Non spécifiée'}`, 15, y + 20);
                doc.setTextColor(0, 0, 0);
                y += 35;
                
                // School information
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text('Informations du groupe', 15, y);
                doc.setFont(undefined, 'normal');
                y += 10;
                
                doc.setFontSize(11);
                doc.text(`École: ${group.schoolName}`, 15, y);
                y += 7;
                doc.text(`Adresse: ${group.city} (${group.postalCode})`, 15, y);
                y += 7;
                doc.text(`Responsable: ${group.leaderFirstName} ${group.leaderLastName}`, 15, y);
                y += 7;
                doc.text(`Composition: ${group.childrenCount} enfants + ${group.adultsCount} accompagnateurs = ${group.childrenCount + group.adultsCount} personnes`, 15, y);
                y += 7;
                doc.text(`Arrivée: ${new Date(group.arrivalTime).toLocaleString('fr-FR')}`, 15, y);
                y += 15;

                // Activities section
                const activityCount = Object.keys(activities).length;
                if (activityCount > 0) {
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.text('Activités payantes', 15, y);
                    doc.setFont(undefined, 'normal');
                    y += 8;
                    
                    // Table header
                    doc.setFillColor(230, 230, 230);
                    doc.rect(15, y - 5, 180, 8, 'F');
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'bold');
                    doc.text('Activité', 20, y);
                    doc.text('Places', 100, y);
                    doc.text('Prix/u', 130, y);
                    doc.text('Total', 160, y);
                    doc.setFont(undefined, 'normal');
                    y += 8;
                    
                    let grandTotal = 0;
                    Object.values(activities).forEach((act, index) => {
                        const actTotal = act.quantity * act.price;
                        grandTotal += actTotal;
                        
                        // Alternate row colors
                        if (index % 2 === 0) {
                            doc.setFillColor(245, 245, 245);
                            doc.rect(15, y - 5, 180, 7, 'F');
                        }
                        
                        doc.text(act.name, 20, y);
                        doc.text(String(act.quantity), 105, y);
                        doc.text(`${act.price}€`, 135, y);
                        doc.text(`${actTotal}€`, 165, y);
                        y += 7;
                    });
                    
                    // Total line
                    y += 3;
                    doc.setDrawColor(200, 200, 200);
                    doc.line(15, y - 3, 195, y - 3);
                    doc.setFont(undefined, 'bold');
                    doc.setFontSize(12);
                    doc.text(`TOTAL: ${grandTotal}€`, 165, y + 5);
                    doc.setFont(undefined, 'normal');
                    y += 15;
                } else {
                    doc.setFontSize(11);
                    doc.setTextColor(150, 150, 150);
                    doc.text('Aucune activité payante', 15, y);
                    doc.setTextColor(0, 0, 0);
                    y += 15;
                }

                // QR Code section
                doc.setFontSize(14);
                doc.setFont(undefined, 'bold');
                doc.text('QR Code d\'identification', 15, y);
                doc.setFont(undefined, 'normal');
                y += 5;
                
                // Generate QR - must be attached to DOM for rendering
                const qrContainer = document.createElement('div');
                qrContainer.style.position = 'fixed';
                qrContainer.style.left = '-9999px';
                qrContainer.style.top = '0';
                document.body.appendChild(qrContainer);
                
                let qrDataUrl = null;
                await new Promise(resolve => {
                    const qrCode = new QRCode(qrContainer, {
                        text: group.id,
                        width: 150,
                        height: 150,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    
                    // Wait for QR to be fully rendered
                    const checkQR = () => {
                        const canvas = qrContainer.querySelector('canvas');
                        if (canvas && canvas.width > 0) {
                            qrDataUrl = canvas.toDataURL('image/png');
                            resolve();
                        } else {
                            setTimeout(checkQR, 50);
                        }
                    };
                    setTimeout(checkQR, 100);
                });
                
                // Clean up
                document.body.removeChild(qrContainer);
                
                // Add QR to PDF
                if (qrDataUrl) {
                    doc.addImage(qrDataUrl, 'PNG', 75, y, 60, 60);
                }
                
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text('Présentez ce QR code aux attractions', 105, y + 70, { align: 'center' });
                doc.setTextColor(0, 0, 0);
                
                // Signature section
                if (group.signature) {
                    y += 85;
                    
                    // Check if there's enough space, add page if needed
                    if (y > 250) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    doc.setFontSize(14);
                    doc.setFont(undefined, 'bold');
                    doc.text('Signature du responsable', 15, y);
                    doc.setFont(undefined, 'normal');
                    y += 5;
                    
                    // Add signature image
                    try {
                        doc.addImage(group.signature, 'PNG', 15, y, 80, 40);
                    } catch (err) {
                        console.error('Error adding signature:', err);
                    }
                    y += 45;
                }
                
                // Footer
                const now = new Date();
                doc.setFontSize(9);
                doc.setTextColor(150, 150, 150);
                doc.text(`Document généré le ${now.toLocaleString('fr-FR')} - Hérouval Control`, 105, 285, { align: 'center' });
                
                // Download PDF with filename
                const filename = `${group.id.replace('#', '')}_Hérouval.pdf`;
                doc.save(filename);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            caisse.init();
        });
    </script>
</body>
</html>
